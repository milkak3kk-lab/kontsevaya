<script>
const DATA = {"entries":[{"code":"A1","label":"Media functions","q":"What are the main media functions?","en":"Media play a central role in connecting people with the world around them, and scholars usually group their work into several core functions. The main functions of the media are: informing (delivering news and facts), educating (spreading knowledge), socialising (passing on norms and values), entertaining (offering relaxation and culture), correlation or interpretation (explaining and connecting events so people understand them), and mobilisation (encouraging people to act, for example during campaigns). A further function is surveillance, meaning the media watch the environment and warn society about threats. Together these functions explain why media are often called the \"fourth estate\".","ru":"Это классический набор функций по Лассуэллу и Райту. Ключевые слова, которые стоит назвать: <strong>informing</strong>, <strong>educating</strong>, <strong>socialising</strong>, <strong>entertaining</strong>, <strong>correlation</strong> (интерпретация событий), <strong>mobilisation</strong> и <strong>surveillance</strong> (наблюдение за средой и предупреждение об угрозах). Достаточно перечислить их и пояснить каждую одним коротким примером.","terms":["<strong>Surveillance</strong>: the media role of watching the environment and warning society about threats and important events (функция наблюдения).","<strong>Correlation (interpretation)</strong>: selecting, explaining and connecting events so the audience can make sense of them (корреляция, интерпретация событий).","<strong>Mobilisation</strong>: encouraging people to take action, for example in campaigns or emergencies (мобилизация).","<strong>The fourth estate</strong>: a nickname for the press as an informal but powerful force in society alongside official power (четвёртая власть)."],"tickets":[1,25],"raw":"what are the main media functions? media functions media play a central role in connecting people with the world around them, and scholars usually group their work into several core functions. the main functions of the media are: informing (delivering news and facts), educating (spreading knowledge), socialising (passing on norms and values), entertaining (offering relaxation and culture), correlation or interpretation (explaining and connecting events so people understand them), and mobilisation (encouraging people to act, for example during campaigns). a further function is surveillance, meaning the media watch the environment and warn society about threats. together these functions explain why media are often called the \"fourth estate\". это классический набор функций по лассуэллу и райту. ключевые слова, которые стоит назвать: **informing**, **educating**, **socialising**, **entertaining**, **correlation** (интерпретация событий), **mobilisation** и **surveillance** (наблюдение за средой и предупреждение об угрозах). достаточно перечислить их и пояснить каждую одним коротким примером."},{"code":"B1","label":"TA: 4 categories","q":"How to describe a target audience for a brand? What 4 categories can be used for it.","en":"Before creating any advertising, a brand must know exactly who it is talking to. To describe a target audience, we usually use four categories. The first is geographic, covering region, country and climate. The second is social-demographic, including age, gender, nationality, occupation, income, family status and level of education. The third is psychographic, describing lifestyle, personality, values and interests. The fourth is behavioral, looking at favorite brands, readiness to buy and type of consumption. Using all four together gives a full, realistic portrait of the customer rather than just a few surface facts.","ru":"Это базовый вопрос прямо со слайда. Четыре категории: <strong>geographic</strong> (регион, страна, климат), <strong>social-demographic</strong> (возраст, пол, доход, занятость, образование и т.д.), <strong>psychographic</strong> (образ жизни, ценности, интересы) и <strong>behavioral</strong> (любимые бренды, готовность к покупке, тип потребления). Главное, назвать все четыре и кратко раскрыть каждую.","terms":["<strong>Target audience (TA)</strong>: the specific group of people a brand aims its product and message at (целевая аудитория).","<strong>Geographic</strong>: segmentation by region, country and climate (географический признак).","<strong>Social-demographic</strong>: segmentation by age, gender, income, occupation, education, family status (социально-демографический признак).","<strong>Psychographic</strong>: segmentation by lifestyle, values, personality and interests (психографический признак).","<strong>Behavioral</strong>: segmentation by habits: favourite brands, readiness to buy, type of consumption (поведенческий признак)."],"tickets":[1,16],"raw":"how to describe a target audience for a brand? what 4 categories can be used for it. ta: 4 categories before creating any advertising, a brand must know exactly who it is talking to. to describe a target audience, we usually use four categories. the first is geographic, covering region, country and climate. the second is social-demographic, including age, gender, nationality, occupation, income, family status and level of education. the third is psychographic, describing lifestyle, personality, values and interests. the fourth is behavioral, looking at favorite brands, readiness to buy and type of consumption. using all four together gives a full, realistic portrait of the customer rather than just a few surface facts. это базовый вопрос прямо со слайда. четыре категории: **geographic** (регион, страна, климат), **social-demographic** (возраст, пол, доход, занятость, образование и т.д.), **psychographic** (образ жизни, ценности, интересы) и **behavioral** (любимые бренды, готовность к покупке, тип потребления). главное, назвать все четыре и кратко раскрыть каждую."},{"code":"C1","label":"TA: Vkusvill","q":"Describe the target audience of ready-made food from Vkusvill (using all 4 categories).","en":"Ready-made food brands succeed only when they know exactly who buys their meals. The target audience of Vkusvill ready-made food, described through all four categories, looks like this. Geographic: residents of large Russian cities such as Moscow and Saint Petersburg, where stores and delivery are available. Social-demographic: people aged about 25 to 45, both genders but skewing female, with medium to high income, often busy professionals. Psychographic: health-conscious people who value natural, fresh and eco-friendly products and lead a busy lifestyle with little time to cook. Behavioral: regular, loyal buyers who choose quick but healthy food and are willing to pay more for quality and a trusted brand.","ru":"Опишите по четырём категориям. <strong>Geographic</strong>: крупные города (Москва, СПб). <strong>Social-demographic</strong>: 25–45 лет, чаще женщины, средний и высокий доход, занятые профессионалы. <strong>Psychographic</strong>: забота о здоровье, ценность натуральных и эко-продуктов, мало времени на готовку. <strong>Behavioral</strong>: постоянные лояльные покупатели, готовы платить больше за качество. Главное, пройтись по всем четырём, как требует слайд.","terms":["<strong>Geographic</strong>: segmentation by region, country and climate (географический признак).","<strong>Social-demographic</strong>: segmentation by age, gender, income, occupation, education, family status (социально-демографический признак).","<strong>Psychographic</strong>: segmentation by lifestyle, values, personality and interests (психографический признак).","<strong>Behavioral</strong>: segmentation by habits: favourite brands, readiness to buy, type of consumption (поведенческий признак)."],"tickets":[1,16],"raw":"describe the target audience of ready-made food from vkusvill (using all 4 categories). ta: vkusvill ready-made food brands succeed only when they know exactly who buys their meals. the target audience of vkusvill ready-made food, described through all four categories, looks like this. geographic: residents of large russian cities such as moscow and saint petersburg, where stores and delivery are available. social-demographic: people aged about 25 to 45, both genders but skewing female, with medium to high income, often busy professionals. psychographic: health-conscious people who value natural, fresh and eco-friendly products and lead a busy lifestyle with little time to cook. behavioral: regular, loyal buyers who choose quick but healthy food and are willing to pay more for quality and a trusted brand. опишите по четырём категориям. **geographic**: крупные города (москва, спб). **social-demographic**: 25–45 лет, чаще женщины, средний и высокий доход, занятые профессионалы. **psychographic**: забота о здоровье, ценность натуральных и эко-продуктов, мало времени на готовку. **behavioral**: постоянные лояльные покупатели, готовы платить больше за качество. главное, пройтись по всем четырём, как требует слайд."},{"code":"A2","label":"Modern media functions","q":"What are the main functions of modern media, and how do they influence society (in your own words)?","en":"Modern media do far more than simply report events; they actively shape how society sees the world. In my own words, their main functions are informing us about what happens, educating and explaining complex topics, entertaining audiences, and connecting communities through shared content. Their influence on society works mainly through agenda-setting, because by choosing which topics to highlight, the media decide what people talk about and consider important. They also shape public opinion through framing, build a sense of shared reality, and can either unite society or deepen its divisions. In short, modern media influence not only what we know but also how we feel and what we value.","ru":"Здесь преподаватель хочет ответ своими словами, поэтому важно не просто перечислить функции, а показать влияние. Главные идеи: медиа формируют <strong>agenda</strong> (повестку), используют <strong>framing</strong> (подачу под определённым углом), создают общую картину реальности и могут как объединять, так и поляризовать общество. Свяжите функции с реальным влиянием на мнения и ценности.","terms":["<strong>Agenda-setting</strong>: the idea that media shape which issues the public sees as important by choosing what to cover (установление повестки дня).","<strong>Framing</strong>: presenting information from a particular angle that influences how the audience interprets it (фрейминг, подача под углом)."],"tickets":[2],"raw":"what are the main functions of modern media, and how do they influence society (in your own words)? modern media functions modern media do far more than simply report events; they actively shape how society sees the world. in my own words, their main functions are informing us about what happens, educating and explaining complex topics, entertaining audiences, and connecting communities through shared content. their influence on society works mainly through agenda-setting, because by choosing which topics to highlight, the media decide what people talk about and consider important. they also shape public opinion through framing, build a sense of shared reality, and can either unite society or deepen its divisions. in short, modern media influence not only what we know but also how we feel and what we value. здесь преподаватель хочет ответ своими словами, поэтому важно не просто перечислить функции, а показать влияние. главные идеи: медиа формируют **agenda** (повестку), используют **framing** (подачу под определённым углом), создают общую картину реальности и могут как объединять, так и поляризовать общество. свяжите функции с реальным влиянием на мнения и ценности."},{"code":"B2","label":"Geographic characteristic","q":"Explain the usage of Geographical characteristic of a target audience. Find example and show how it works.","en":"Where a customer lives often decides what they actually need. The geographic characteristic of a target audience describes the region, country and climate in which customers live. It is used because location strongly affects needs, habits and buying power. For example, a brand selling warm down jackets will focus on the cold northern regions of Russia like Siberia, where the climate creates real demand, rather than on the warm south. By knowing the geography, the brand can choose the right products, prices and even advertising channels for each area.","ru":"<strong>Geographic</strong> = регион, страна, климат. Зачем: место проживания влияет на потребности и покупательную способность. Пример: бренд тёплых пуховиков таргетируется на холодные северные регионы (Сибирь), где климат создаёт спрос, а не на тёплый юг. Покажите логику \"место определяет потребность\".","terms":["<strong>Geographic</strong>: segmentation by region, country and climate (географический признак)."],"tickets":[2,17],"raw":"explain the usage of geographical characteristic of a target audience. find example and show how it works. geographic characteristic where a customer lives often decides what they actually need. the geographic characteristic of a target audience describes the region, country and climate in which customers live. it is used because location strongly affects needs, habits and buying power. for example, a brand selling warm down jackets will focus on the cold northern regions of russia like siberia, where the climate creates real demand, rather than on the warm south. by knowing the geography, the brand can choose the right products, prices and even advertising channels for each area. **geographic** = регион, страна, климат. зачем: место проживания влияет на потребности и покупательную способность. пример: бренд тёплых пуховиков таргетируется на холодные северные регионы (сибирь), где климат создаёт спрос, а не на тёплый юг. покажите логику \"место определяет потребность\"."},{"code":"C2","label":"TA: Samokat","q":"Describe the target audience of ready-made food from Samokat (using all 4 categories).","en":"A fast-delivery service attracts a very specific kind of customer who values speed above all. The target audience of Samokat ready-made food, in four categories, is as follows. Geographic: residents of large and mid-sized cities covered by Samokat's fast-delivery zones. Social-demographic: young people aged about 18 to 35, students and young professionals, with medium income. Psychographic: people who value convenience, speed and a modern digital lifestyle, often spontaneous and time-poor. Behavioral: frequent app users who make quick, often impulsive orders, value delivery in minutes and choose Samokat for everyday small purchases rather than big planned shopping.","ru":"<strong>Geographic</strong>: города в зоне быстрой доставки. <strong>Social-demographic</strong>: 18–35 лет, студенты и молодые специалисты, средний доход. <strong>Psychographic</strong>: ценят скорость, удобство, цифровой образ жизни, часто действуют спонтанно. <strong>Behavioral</strong>: активные пользователи приложения, частые импульсивные заказы, доставка \"за минуты\", мелкие повседневные покупки. Сделайте акцент на скорости и удобстве как ядре аудитории Samokat.","terms":["<strong>Geographic</strong>: segmentation by region, country and climate (географический признак).","<strong>Social-demographic</strong>: segmentation by age, gender, income, occupation, education, family status (социально-демографический признак).","<strong>Psychographic</strong>: segmentation by lifestyle, values, personality and interests (психографический признак).","<strong>Behavioral</strong>: segmentation by habits: favourite brands, readiness to buy, type of consumption (поведенческий признак)."],"tickets":[2,17],"raw":"describe the target audience of ready-made food from samokat (using all 4 categories). ta: samokat a fast-delivery service attracts a very specific kind of customer who values speed above all. the target audience of samokat ready-made food, in four categories, is as follows. geographic: residents of large and mid-sized cities covered by samokat's fast-delivery zones. social-demographic: young people aged about 18 to 35, students and young professionals, with medium income. psychographic: people who value convenience, speed and a modern digital lifestyle, often spontaneous and time-poor. behavioral: frequent app users who make quick, often impulsive orders, value delivery in minutes and choose samokat for everyday small purchases rather than big planned shopping. **geographic**: города в зоне быстрой доставки. **social-demographic**: 18–35 лет, студенты и молодые специалисты, средний доход. **psychographic**: ценят скорость, удобство, цифровой образ жизни, часто действуют спонтанно. **behavioral**: активные пользователи приложения, частые импульсивные заказы, доставка \"за минуты\", мелкие повседневные покупки. сделайте акцент на скорости и удобстве как ядре аудитории samokat."},{"code":"A3","label":"Commercial radio decade","q":"Which decade is associated with the emergence of commercial radio stations?","en":"Radio shifted from an experimental technology to a true mass medium in a single decade. Commercial radio stations are associated with the 1920s. The first widely recognised commercial station, KDKA in Pittsburgh, began regular broadcasting in 1920, and throughout that decade advertising-funded stations spread rapidly across the United States and beyond. This is why the 1920s are often called the start of the \"golden age of radio\".","ru":"Короткий фактический ответ: <strong>the 1920s</strong>. Опорная точка, которую можно назвать, станция <strong>KDKA</strong> (Питтсбург, 1920 год) и появление рекламной модели финансирования. Этого достаточно для 20 баллов, главное уверенно назвать десятилетие.","terms":["<strong>Commercial radio</strong>: radio stations funded mainly by advertising rather than the state (коммерческое радио)."],"tickets":[3],"raw":"which decade is associated with the emergence of commercial radio stations? commercial radio decade radio shifted from an experimental technology to a true mass medium in a single decade. commercial radio stations are associated with the 1920s. the first widely recognised commercial station, kdka in pittsburgh, began regular broadcasting in 1920, and throughout that decade advertising-funded stations spread rapidly across the united states and beyond. this is why the 1920s are often called the start of the \"golden age of radio\". короткий фактический ответ: **the 1920s**. опорная точка, которую можно назвать, станция **kdka** (питтсбург, 1920 год) и появление рекламной модели финансирования. этого достаточно для 20 баллов, главное уверенно назвать десятилетие."},{"code":"B3","label":"Behavioral characteristic","q":"Explain the usage of Behavioral characteristic of a target audience. Find example and show how it works.","en":"Sometimes the best way to understand customers is to look at what they actually do. The behavioral characteristic of a target audience describes their favorite brands, readiness to buy and type of consumption, in other words their real habits and relationship with products. It is used to separate loyal heavy users from occasional or first-time buyers and to tailor offers accordingly. For example, a coffee chain like Surf Coffee can target heavy users who buy coffee every single morning, offering them a loyalty card with a free drink, while sending discount coupons to occasional visitors to encourage them to come more often.","ru":"<strong>Behavioral</strong> = поведение: любимые бренды, готовность к покупке, тип потребления. Зачем: отделить лояльных частых покупателей от случайных и под каждый тип сделать своё предложение. Пример: кофейня даёт постоянным клиентам карту лояльности, а редким, скидочные купоны. Подчеркните, что критерий, это реальные действия, а не слова.","terms":["<strong>Behavioral</strong>: segmentation by habits: favourite brands, readiness to buy, type of consumption (поведенческий признак).","<strong>Heavy user</strong>: a customer who buys or uses a product very often (активный потребитель)."],"tickets":[3,18],"raw":"explain the usage of behavioral characteristic of a target audience. find example and show how it works. behavioral characteristic sometimes the best way to understand customers is to look at what they actually do. the behavioral characteristic of a target audience describes their favorite brands, readiness to buy and type of consumption, in other words their real habits and relationship with products. it is used to separate loyal heavy users from occasional or first-time buyers and to tailor offers accordingly. for example, a coffee chain like surf coffee can target heavy users who buy coffee every single morning, offering them a loyalty card with a free drink, while sending discount coupons to occasional visitors to encourage them to come more often. **behavioral** = поведение: любимые бренды, готовность к покупке, тип потребления. зачем: отделить лояльных частых покупателей от случайных и под каждый тип сделать своё предложение. пример: кофейня даёт постоянным клиентам карту лояльности, а редким, скидочные купоны. подчеркните, что критерий, это реальные действия, а не слова."},{"code":"C3","label":"TA: Pyaterochka","q":"Describe the target audience of ready-made food from Pyaterochka (using all 4 categories).","en":"A mass-market grocery chain has to appeal to a very broad, value-driven audience. The target audience of Pyaterochka ready-made food, in four categories, is as follows. Geographic: the whole of Russia, including small towns and residential districts, thanks to its huge store network. Social-demographic: a very broad group aged about 25 to 55, including families, with lower to medium income. Psychographic: practical, price-sensitive people who value convenience and good value for money rather than a premium image. Behavioral: regular everyday shoppers who buy food close to home, react strongly to discounts and promotions and use the loyalty card. The core idea is affordable, convenient food for the mass market.","ru":"<strong>Geographic</strong>: вся Россия, включая малые города и спальные районы (огромная сеть). <strong>Social-demographic</strong>: широкая группа 25–55 лет, семьи, низкий и средний доход. <strong>Psychographic</strong>: практичность, чувствительность к цене, ценность \"выгодно и рядом\". <strong>Behavioral</strong>: ежедневные покупки у дома, реакция на скидки, карта лояльности. Ядро, доступная еда для массового сегмента.","terms":["<strong>Geographic</strong>: segmentation by region, country and climate (географический признак).","<strong>Social-demographic</strong>: segmentation by age, gender, income, occupation, education, family status (социально-демографический признак).","<strong>Psychographic</strong>: segmentation by lifestyle, values, personality and interests (психографический признак).","<strong>Behavioral</strong>: segmentation by habits: favourite brands, readiness to buy, type of consumption (поведенческий признак)."],"tickets":[3,18],"raw":"describe the target audience of ready-made food from pyaterochka (using all 4 categories). ta: pyaterochka a mass-market grocery chain has to appeal to a very broad, value-driven audience. the target audience of pyaterochka ready-made food, in four categories, is as follows. geographic: the whole of russia, including small towns and residential districts, thanks to its huge store network. social-demographic: a very broad group aged about 25 to 55, including families, with lower to medium income. psychographic: practical, price-sensitive people who value convenience and good value for money rather than a premium image. behavioral: regular everyday shoppers who buy food close to home, react strongly to discounts and promotions and use the loyalty card. the core idea is affordable, convenient food for the mass market. **geographic**: вся россия, включая малые города и спальные районы (огромная сеть). **social-demographic**: широкая группа 25–55 лет, семьи, низкий и средний доход. **psychographic**: практичность, чувствительность к цене, ценность \"выгодно и рядом\". **behavioral**: ежедневные покупки у дома, реакция на скидки, карта лояльности. ядро, доступная еда для массового сегмента."},{"code":"A4","label":"Printing press inventor","q":"Who invented the printing press with movable metal type in the 1440s? Why was it a milestone?","en":"The invention that launched the era of mass communication came in the middle of the fifteenth century. The printing press with movable metal type was invented by Johannes Gutenberg in Germany in the 1440s, with his famous Gutenberg Bible printed around 1450. It was a milestone because it allowed books to be produced quickly, cheaply and in large numbers for the first time. This dramatically increased literacy, standardised texts so that every copy was identical, and helped spread new ideas, fuelling the Renaissance, the Reformation and the Scientific Revolution.","ru":"Имя, которое нужно назвать: <strong>Johannes Gutenberg</strong>, 1440-е годы, Германия. Почему это веха (<strong>milestone</strong>): массовое и дешёвое производство книг, рост грамотности, <strong>standardisation</strong> текстов (одинаковые копии) и быстрое распространение идей. Достаточно связать изобретение с его последствиями для общества.","terms":["<strong>Movable type</strong>: small reusable metal letters that can be arranged to print any text (наборный шрифт).","<strong>Standardisation of texts</strong>: making every printed copy identical, removing the errors of hand-copying (стандартизация текстов)."],"tickets":[4,5],"raw":"who invented the printing press with movable metal type in the 1440s? why was it a milestone? printing press inventor the invention that launched the era of mass communication came in the middle of the fifteenth century. the printing press with movable metal type was invented by johannes gutenberg in germany in the 1440s, with his famous gutenberg bible printed around 1450. it was a milestone because it allowed books to be produced quickly, cheaply and in large numbers for the first time. this dramatically increased literacy, standardised texts so that every copy was identical, and helped spread new ideas, fuelling the renaissance, the reformation and the scientific revolution. имя, которое нужно назвать: **johannes gutenberg**, 1440-е годы, германия. почему это веха (**milestone**): массовое и дешёвое производство книг, рост грамотности, **standardisation** текстов (одинаковые копии) и быстрое распространение идей. достаточно связать изобретение с его последствиями для общества."},{"code":"B4","label":"Social-demographic","q":"Explain the usage of Social-demographic characteristic of a target audience. Find example and show how it works.","en":"The most common way to picture a customer is through basic social facts about them. The social-demographic characteristic of a target audience includes age, gender, nationality, occupation, income, family status and level of education. It is used because these factors strongly shape what people can afford and what they want. For example, a premium car brand may target men aged 35 to 55, with higher education and high income, often married with families, because this group has both the money and the lifestyle to buy a premium vehicle. These clear, measurable facts make it easy to plan products and advertising.","ru":"<strong>Social-demographic</strong> = возраст, пол, национальность, занятость, доход, семейный статус, образование. Зачем: эти признаки определяют, что человек может себе позволить и чего хочет. Пример: премиальный автобренд таргетируется на мужчин 35–55 лет с высоким доходом и высшим образованием, часто семейных. Плюс этого критерия, он измеримый и конкретный.","terms":["<strong>Social-demographic</strong>: segmentation by age, gender, income, occupation, education, family status (социально-демографический признак)."],"tickets":[4,19],"raw":"explain the usage of social-demographic characteristic of a target audience. find example and show how it works. social-demographic the most common way to picture a customer is through basic social facts about them. the social-demographic characteristic of a target audience includes age, gender, nationality, occupation, income, family status and level of education. it is used because these factors strongly shape what people can afford and what they want. for example, a premium car brand may target men aged 35 to 55, with higher education and high income, often married with families, because this group has both the money and the lifestyle to buy a premium vehicle. these clear, measurable facts make it easy to plan products and advertising. **social-demographic** = возраст, пол, национальность, занятость, доход, семейный статус, образование. зачем: эти признаки определяют, что человек может себе позволить и чего хочет. пример: премиальный автобренд таргетируется на мужчин 35–55 лет с высоким доходом и высшим образованием, часто семейных. плюс этого критерия, он измеримый и конкретный."},{"code":"C4","label":"TA: Ozon Fresh","q":"Describe the target audience of ready-made food from Ozon Fresh (using all 4 categories).","en":"Online grocery delivery attracts customers who plan ahead and value convenience. The target audience of Ozon Fresh ready-made food, in four categories, is as follows. Geographic: residents of cities covered by Ozon Fresh delivery, mainly large urban centres. Social-demographic: working people aged about 25 to 45, professionals and families, with medium to high income. Psychographic: convenience-oriented and tech-savvy people who are busy and prefer to shop online rather than visit a store. Behavioral: online shoppers who often make larger planned orders, value home delivery and a wide assortment, and frequently combine groceries with other Ozon purchases. The key driver is saving time through online delivery.","ru":"<strong>Geographic</strong>: города с доставкой Ozon Fresh, в основном крупные. <strong>Social-demographic</strong>: 25–45 лет, работающие профессионалы и семьи, средний и высокий доход. <strong>Psychographic</strong>: ориентация на удобство, технологичность, занятость. <strong>Behavioral</strong>: онлайн-покупки, чаще плановые крупные заказы, ценят доставку домой и широкий ассортимент. Ключевой драйвер, экономия времени через онлайн.","terms":["<strong>Geographic</strong>: segmentation by region, country and climate (географический признак).","<strong>Social-demographic</strong>: segmentation by age, gender, income, occupation, education, family status (социально-демографический признак).","<strong>Psychographic</strong>: segmentation by lifestyle, values, personality and interests (психографический признак).","<strong>Behavioral</strong>: segmentation by habits: favourite brands, readiness to buy, type of consumption (поведенческий признак)."],"tickets":[4,19],"raw":"describe the target audience of ready-made food from ozon fresh (using all 4 categories). ta: ozon fresh online grocery delivery attracts customers who plan ahead and value convenience. the target audience of ozon fresh ready-made food, in four categories, is as follows. geographic: residents of cities covered by ozon fresh delivery, mainly large urban centres. social-demographic: working people aged about 25 to 45, professionals and families, with medium to high income. psychographic: convenience-oriented and tech-savvy people who are busy and prefer to shop online rather than visit a store. behavioral: online shoppers who often make larger planned orders, value home delivery and a wide assortment, and frequently combine groceries with other ozon purchases. the key driver is saving time through online delivery. **geographic**: города с доставкой ozon fresh, в основном крупные. **social-demographic**: 25–45 лет, работающие профессионалы и семьи, средний и высокий доход. **psychographic**: ориентация на удобство, технологичность, занятость. **behavioral**: онлайн-покупки, чаще плановые крупные заказы, ценят доставку домой и широкий ассортимент. ключевой драйвер, экономия времени через онлайн."},{"code":"B5","label":"Psychographic","q":"Explain the usage of Psychographic characteristic of a target audience. Find example and show how it works.","en":"Two people of the same age and income can still want completely different things, and that is where psychographics help. The psychographic characteristic of a target audience describes lifestyle, personality, values and interests, in other words how a person thinks and lives. It is used to connect a brand to deeper motivations, not just demographics. For example, an eco-friendly cosmetics brand targets people who value sustainability, care about nature and follow a conscious lifestyle, regardless of their exact age or income. Advertising can then speak directly to these values, which builds a strong emotional connection.","ru":"<strong>Psychographic</strong> = образ жизни, личность, ценности, интересы (как человек думает и живёт). Зачем: связать бренд с глубинными мотивами, а не только с демографией. Пример: эко-косметика обращается к людям, которые ценят устойчивость и осознанное потребление, независимо от возраста и дохода. Это даёт эмоциональную связь через ценности.","terms":["<strong>Psychographic</strong>: segmentation by lifestyle, values, personality and interests (психографический признак)."],"tickets":[5,20],"raw":"explain the usage of psychographic characteristic of a target audience. find example and show how it works. psychographic two people of the same age and income can still want completely different things, and that is where psychographics help. the psychographic characteristic of a target audience describes lifestyle, personality, values and interests, in other words how a person thinks and lives. it is used to connect a brand to deeper motivations, not just demographics. for example, an eco-friendly cosmetics brand targets people who value sustainability, care about nature and follow a conscious lifestyle, regardless of their exact age or income. advertising can then speak directly to these values, which builds a strong emotional connection. **psychographic** = образ жизни, личность, ценности, интересы (как человек думает и живёт). зачем: связать бренд с глубинными мотивами, а не только с демографией. пример: эко-косметика обращается к людям, которые ценят устойчивость и осознанное потребление, независимо от возраста и дохода. это даёт эмоциональную связь через ценности."},{"code":"C5","label":"TA: Yandex Lavka","q":"Describe the target audience of ready-made food from Yandex Lavka (using all 4 categories).","en":"Ultra-fast delivery in minutes shapes a distinctive, impulsive audience. The target audience of Yandex Lavka ready-made food, in four categories, is as follows. Geographic: residents of major cities with dense Lavka coverage, especially central districts. Social-demographic: young urban people aged about 20 to 35, students and young professionals, with medium income. Psychographic: people who value instant gratification, convenience and a fully digital lifestyle, often living alone or in small households. Behavioral: frequent small orders placed through the app, often impulsive \"I want it now\" purchases such as a quick lunch or a forgotten ingredient, with strong reliance on delivery speed. The core idea is everyday needs satisfied instantly.","ru":"<strong>Geographic</strong>: крупные города с плотным покрытием, особенно центр. <strong>Social-demographic</strong>: 20–35 лет, студенты и молодые специалисты, средний доход. <strong>Psychographic</strong>: ценность мгновенного результата, удобства, цифровой образ жизни, часто одиночные домохозяйства. <strong>Behavioral</strong>: частые мелкие импульсивные заказы через приложение (\"хочу сейчас\"), ставка на скорость. Ядро, повседневные потребности здесь и сейчас.","terms":["<strong>Geographic</strong>: segmentation by region, country and climate (географический признак).","<strong>Social-demographic</strong>: segmentation by age, gender, income, occupation, education, family status (социально-демографический признак).","<strong>Psychographic</strong>: segmentation by lifestyle, values, personality and interests (психографический признак).","<strong>Behavioral</strong>: segmentation by habits: favourite brands, readiness to buy, type of consumption (поведенческий признак)."],"tickets":[5,20],"raw":"describe the target audience of ready-made food from yandex lavka (using all 4 categories). ta: yandex lavka ultra-fast delivery in minutes shapes a distinctive, impulsive audience. the target audience of yandex lavka ready-made food, in four categories, is as follows. geographic: residents of major cities with dense lavka coverage, especially central districts. social-demographic: young urban people aged about 20 to 35, students and young professionals, with medium income. psychographic: people who value instant gratification, convenience and a fully digital lifestyle, often living alone or in small households. behavioral: frequent small orders placed through the app, often impulsive \"i want it now\" purchases such as a quick lunch or a forgotten ingredient, with strong reliance on delivery speed. the core idea is everyday needs satisfied instantly. **geographic**: крупные города с плотным покрытием, особенно центр. **social-demographic**: 20–35 лет, студенты и молодые специалисты, средний доход. **psychographic**: ценность мгновенного результата, удобства, цифровой образ жизни, часто одиночные домохозяйства. **behavioral**: частые мелкие импульсивные заказы через приложение (\"хочу сейчас\"), ставка на скорость. ядро, повседневные потребности здесь и сейчас."},{"code":"A5","label":"Gutenberg's impact","q":"How did Johannes Gutenberg's invention of the printing press transform the spread of knowledge and standardization of texts?","en":"Few inventions changed human history as deeply as the printing press. Gutenberg's press transformed the spread of knowledge by making it possible to produce many identical copies of a text quickly and at low cost, instead of copying each book slowly by hand. This meant knowledge was no longer controlled by a small elite of scribes; books became affordable and reached a much wider public, which raised literacy across Europe. The press also standardised texts, because every printed copy was the same, removing the errors that crept in during hand-copying. As a result it accelerated the Renaissance, the Reformation and the rise of modern science.","ru":"Здесь акцент на трансформацию, а не на дату. Две ключевые идеи: (1) массовое тиражирование сделало знание доступным и дешёвым, поэтому выросла грамотность; (2) <strong>standardisation</strong> убрала ошибки переписчиков, ведь все копии одинаковые. Свяжите это с Возрождением, Реформацией и научной революцией.","terms":["<strong>Standardisation of texts</strong>: making every printed copy identical, removing the errors of hand-copying (стандартизация текстов)."],"tickets":[6],"raw":"how did johannes gutenberg's invention of the printing press transform the spread of knowledge and standardization of texts? gutenberg's impact few inventions changed human history as deeply as the printing press. gutenberg's press transformed the spread of knowledge by making it possible to produce many identical copies of a text quickly and at low cost, instead of copying each book slowly by hand. this meant knowledge was no longer controlled by a small elite of scribes; books became affordable and reached a much wider public, which raised literacy across europe. the press also standardised texts, because every printed copy was the same, removing the errors that crept in during hand-copying. as a result it accelerated the renaissance, the reformation and the rise of modern science. здесь акцент на трансформацию, а не на дату. две ключевые идеи: (1) массовое тиражирование сделало знание доступным и дешёвым, поэтому выросла грамотность; (2) **standardisation** убрала ошибки переписчиков, ведь все копии одинаковые. свяжите это с возрождением, реформацией и научной революцией."},{"code":"B6","label":"CJM meaning","q":"Explain the meaning of CJM using your own words. Describe this model and give your opinion about the effectiveness of CJM.","en":"Buying something is rarely a single moment; it is a journey with several steps. In my own words, a Customer Journey Map (CJM) is a visual table that shows the whole path a customer takes from first hearing about a product to making a decision, broken into stages such as Awareness, Consideration and Decision. For each stage it describes the customer's pain points, triggers, actions, touchpoints and the brand's call to action. In my opinion, CJM is very effective because it forces a company to look at the world through the customer's eyes and to plan the right message for each stage. Its main limitation is that real journeys are messy and non-linear, so the map is a simplification, but it is still a very useful planning tool.","ru":"Своими словами: <strong>CJM</strong> (Customer Journey Map), это визуальная таблица пути клиента от первого знакомства до решения, разбитая на стадии (<strong>Awareness</strong>, <strong>Consideration</strong>, <strong>Decision</strong>), где по каждой описаны pain point, trigger, actions, touchpoints и CTA. Мнение об эффективности: полезна, так как заставляет смотреть глазами клиента и подбирать сообщение под этап; ограничение, реальный путь нелинейный, поэтому карта это упрощение.","terms":["<strong>CJM (Customer Journey Map)</strong>: a table mapping the customer path from awareness to decision (карта пути клиента).","<strong>Pain point</strong>: the problem or need the consumer feels (боль клиента).","<strong>Trigger</strong>: the event that pushes the consumer to consider the product (триггер).","<strong>Touchpoint</strong>: a channel where the consumer meets the brand (точка контакта).","<strong>CTA (Call to Action)</strong>: what the brand asks the consumer to do next (призыв к действию)."],"tickets":[6,21],"raw":"explain the meaning of cjm using your own words. describe this model and give your opinion about the effectiveness of cjm. cjm meaning buying something is rarely a single moment; it is a journey with several steps. in my own words, a customer journey map (cjm) is a visual table that shows the whole path a customer takes from first hearing about a product to making a decision, broken into stages such as awareness, consideration and decision. for each stage it describes the customer's pain points, triggers, actions, touchpoints and the brand's call to action. in my opinion, cjm is very effective because it forces a company to look at the world through the customer's eyes and to plan the right message for each stage. its main limitation is that real journeys are messy and non-linear, so the map is a simplification, but it is still a very useful planning tool. своими словами: **cjm** (customer journey map), это визуальная таблица пути клиента от первого знакомства до решения, разбитая на стадии (**awareness**, **consideration**, **decision**), где по каждой описаны pain point, trigger, actions, touchpoints и cta. мнение об эффективности: полезна, так как заставляет смотреть глазами клиента и подбирать сообщение под этап; ограничение, реальный путь нелинейный, поэтому карта это упрощение."},{"code":"C6","label":"CJM: XFIT","q":"Make a CJM for the brand XFIT. Start with the description of the representative of TA.","en":"A customer journey always starts with a real person, so let me first describe the target audience representative. Imagine Anna, 28, an office worker in Moscow with a medium income who feels unfit, tired and unhappy with her shape and wants to start exercising. Her CJM for the fitness club XFIT looks like this. Awareness: pain, she feels low energy and dislikes her reflection; trigger, she sees an XFIT ad or a friend's gym post; touchpoints, Instagram, outdoor ads, word of mouth. Consideration: pain, she worries about price and whether she will actually go; trigger, a free trial offer; touchpoints, the website, reviews, the club's social media. Decision: pain, fear of choosing the wrong club; trigger, a convenient location and a discount; touchpoints, a club visit and a talk with a manager. The CTA at each stage moves her from \"I should\" to \"I signed up today\".","ru":"Сначала опишите представителя ТА (например, Анна, 28 лет, офис, Москва, средний доход, недовольна формой). Затем CJM по стадиям: <strong>Awareness</strong> (боль, нет энергии; триггер, реклама/пост подруги; touchpoints, соцсети, наружка), <strong>Consideration</strong> (боль, цена и сомнения; триггер, бесплатное пробное занятие; touchpoints, сайт, отзывы), <strong>Decision</strong> (боль, страх выбрать не тот клуб; триггер, удобная локация и скидка; touchpoints, визит, менеджер). На каждом этапе свой CTA. Начните именно с портрета человека, это прямо требуется в билете.","terms":["<strong>CJM (Customer Journey Map)</strong>: a table mapping the customer path from awareness to decision (карта пути клиента).","<strong>Pain point</strong>: the problem or need the consumer feels (боль клиента).","<strong>Trigger</strong>: the event that pushes the consumer to consider the product (триггер).","<strong>Touchpoint</strong>: a channel where the consumer meets the brand (точка контакта).","<strong>CTA (Call to Action)</strong>: what the brand asks the consumer to do next (призыв к действию)."],"tickets":[6,21],"raw":"make a cjm for the brand xfit. start with the description of the representative of ta. cjm: xfit a customer journey always starts with a real person, so let me first describe the target audience representative. imagine anna, 28, an office worker in moscow with a medium income who feels unfit, tired and unhappy with her shape and wants to start exercising. her cjm for the fitness club xfit looks like this. awareness: pain, she feels low energy and dislikes her reflection; trigger, she sees an xfit ad or a friend's gym post; touchpoints, instagram, outdoor ads, word of mouth. consideration: pain, she worries about price and whether she will actually go; trigger, a free trial offer; touchpoints, the website, reviews, the club's social media. decision: pain, fear of choosing the wrong club; trigger, a convenient location and a discount; touchpoints, a club visit and a talk with a manager. the cta at each stage moves her from \"i should\" to \"i signed up today\". сначала опишите представителя та (например, анна, 28 лет, офис, москва, средний доход, недовольна формой). затем cjm по стадиям: **awareness** (боль, нет энергии; триггер, реклама/пост подруги; touchpoints, соцсети, наружка), **consideration** (боль, цена и сомнения; триггер, бесплатное пробное занятие; touchpoints, сайт, отзывы), **decision** (боль, страх выбрать не тот клуб; триггер, удобная локация и скидка; touchpoints, визит, менеджер). на каждом этапе свой cta. начните именно с портрета человека, это прямо требуется в билете."},{"code":"A6","label":"Agenda-setting","q":"What is agenda-setting theory and how does it influence public opinion?","en":"One of the most influential ideas in media studies explains how the news shapes our priorities. Agenda-setting theory, developed by McCombs and Shaw in 1972 after their Chapel Hill study, argues that the media do not tell us what to think, but they are very successful in telling us what to think about. By giving certain topics heavy coverage and ignoring others, the media transfer the importance, or salience, of those issues to the public. So if news outlets constantly cover inflation or migration, audiences start to see these as the most important problems, which directly influences public opinion and political priorities.","ru":"Ключевая формула, которую любят преподаватели: медиа говорят нам не что думать, а <strong>о чём думать</strong> (what to think about). Авторы: <strong>McCombs</strong> и <strong>Shaw</strong> (1972). Механизм, перенос значимости (<strong>salience</strong>) темы от СМИ к аудитории через объём освещения. Этого достаточно, плюс один пример повестки.","terms":["<strong>Agenda-setting</strong>: the idea that media shape which issues the public sees as important by choosing what to cover (установление повестки дня).","<strong>Salience</strong>: the perceived importance of a topic; agenda-setting transfers salience from media to public (значимость темы)."],"tickets":[7],"raw":"what is agenda-setting theory and how does it influence public opinion? agenda-setting one of the most influential ideas in media studies explains how the news shapes our priorities. agenda-setting theory, developed by mccombs and shaw in 1972 after their chapel hill study, argues that the media do not tell us what to think, but they are very successful in telling us what to think about. by giving certain topics heavy coverage and ignoring others, the media transfer the importance, or salience, of those issues to the public. so if news outlets constantly cover inflation or migration, audiences start to see these as the most important problems, which directly influences public opinion and political priorities. ключевая формула, которую любят преподаватели: медиа говорят нам не что думать, а **о чём думать** (what to think about). авторы: **mccombs** и **shaw** (1972). механизм, перенос значимости (**salience**) темы от сми к аудитории через объём освещения. этого достаточно, плюс один пример повестки."},{"code":"B7","label":"Pain point &amp; Trigger","q":"Explain the usage of categories «Pain point» and «Trigger» as first steps in CJM.","en":"Every customer journey begins with a problem and a spark that sets it in motion. In CJM, \"Pain point\" and \"Trigger\" are the first two steps. The pain point describes what the consumer thinks and feels, the problem or need that makes them unhappy with their current situation, for example \"my style is boring and I don't know how to stand out\". The trigger is the event or moment that pushes the consumer to start thinking about us or our product, for example seeing a striking outfit video on the TikTok feed. Together they explain why the journey starts at all: first there is an unmet need, then something triggers the search for a solution.","ru":"<strong>Pain point</strong>, это что потребитель думает и чувствует, его проблема или неудовлетворённость (\"мой стиль скучный, не знаю, как выделиться\"). <strong>Trigger</strong>, событие, которое подталкивает задуматься о продукте (например, яркое видео с образом в ленте TikTok). Логика: сначала есть боль (потребность), затем триггер запускает поиск решения. Это старт всей карты пути.","terms":["<strong>Pain point</strong>: the problem or need the consumer feels (боль клиента).","<strong>Trigger</strong>: the event that pushes the consumer to consider the product (триггер)."],"tickets":[7,22],"raw":"explain the usage of categories «pain point» and «trigger» as first steps in cjm. pain point & trigger every customer journey begins with a problem and a spark that sets it in motion. in cjm, \"pain point\" and \"trigger\" are the first two steps. the pain point describes what the consumer thinks and feels, the problem or need that makes them unhappy with their current situation, for example \"my style is boring and i don't know how to stand out\". the trigger is the event or moment that pushes the consumer to start thinking about us or our product, for example seeing a striking outfit video on the tiktok feed. together they explain why the journey starts at all: first there is an unmet need, then something triggers the search for a solution. **pain point**, это что потребитель думает и чувствует, его проблема или неудовлетворённость (\"мой стиль скучный, не знаю, как выделиться\"). **trigger**, событие, которое подталкивает задуматься о продукте (например, яркое видео с образом в ленте tiktok). логика: сначала есть боль (потребность), затем триггер запускает поиск решения. это старт всей карты пути."},{"code":"C7","label":"CJM: World Class","q":"Make a CJM for the brand World Class. Start with the description of the representative of TA.","en":"Again, the map should begin with a clear portrait of the target customer. Imagine Dmitry, 35, a successful manager in a big city with a high income, who values status, quality and a premium experience and wants a gym that matches his lifestyle. His CJM for the premium fitness club World Class looks like this. Awareness: pain, he feels stressed and out of shape but will not go to a cheap, crowded gym; trigger, a colleague mentions World Class or he sees a premium ad; touchpoints, business media, Instagram, recommendations. Consideration: pain, he wants to be sure the service and clientele match his status; trigger, an invitation to a guided tour and a guest visit; touchpoints, the website, the club tour, a personal manager. Decision: pain, fear of overpaying for an unused membership; trigger, a personal trainer offer and a flexible premium package; touchpoints, the club, the manager. The CTA guides him from interest to a signed premium membership.","ru":"Снова начните с портрета (например, Дмитрий, 35 лет, успешный менеджер, высокий доход, ценит статус и премиум-сервис). CJM: <strong>Awareness</strong> (боль, стресс и форма, но не пойдёт в дешёвый зал; триггер, премиальная реклама/совет коллеги), <strong>Consideration</strong> (боль, соответствует ли сервис его статусу; триггер, экскурсия и гостевой визит; touchpoints, сайт, персональный менеджер), <strong>Decision</strong> (боль, переплата за неиспользуемый абонемент; триггер, персональный тренер и гибкий пакет). Подчеркните премиальность: для World Class ключевой драйвер, статус и качество сервиса.","terms":["<strong>CJM (Customer Journey Map)</strong>: a table mapping the customer path from awareness to decision (карта пути клиента).","<strong>Pain point</strong>: the problem or need the consumer feels (боль клиента).","<strong>Trigger</strong>: the event that pushes the consumer to consider the product (триггер).","<strong>Touchpoint</strong>: a channel where the consumer meets the brand (точка контакта).","<strong>CTA (Call to Action)</strong>: what the brand asks the consumer to do next (призыв к действию)."],"tickets":[7,22],"raw":"make a cjm for the brand world class. start with the description of the representative of ta. cjm: world class again, the map should begin with a clear portrait of the target customer. imagine dmitry, 35, a successful manager in a big city with a high income, who values status, quality and a premium experience and wants a gym that matches his lifestyle. his cjm for the premium fitness club world class looks like this. awareness: pain, he feels stressed and out of shape but will not go to a cheap, crowded gym; trigger, a colleague mentions world class or he sees a premium ad; touchpoints, business media, instagram, recommendations. consideration: pain, he wants to be sure the service and clientele match his status; trigger, an invitation to a guided tour and a guest visit; touchpoints, the website, the club tour, a personal manager. decision: pain, fear of overpaying for an unused membership; trigger, a personal trainer offer and a flexible premium package; touchpoints, the club, the manager. the cta guides him from interest to a signed premium membership. снова начните с портрета (например, дмитрий, 35 лет, успешный менеджер, высокий доход, ценит статус и премиум-сервис). cjm: **awareness** (боль, стресс и форма, но не пойдёт в дешёвый зал; триггер, премиальная реклама/совет коллеги), **consideration** (боль, соответствует ли сервис его статусу; триггер, экскурсия и гостевой визит; touchpoints, сайт, персональный менеджер), **decision** (боль, переплата за неиспользуемый абонемент; триггер, персональный тренер и гибкий пакет). подчеркните премиальность: для world class ключевой драйвер, статус и качество сервиса."},{"code":"A7","label":"TV milestones","q":"What were the key milestones in the history of television broadcasting?","en":"Television grew from a laboratory experiment into the dominant medium of the twentieth century through several key steps. The main milestones were: the early mechanical television demonstrated by John Logie Baird in the 1920s; the move to electronic television in the 1930s thanks to inventors like Vladimir Zworykin and Philo Farnsworth; the first regular public broadcasts, such as the BBC service from 1936; the rapid post-war boom of TV in homes during the 1950s; the arrival of colour television in the 1950s and 1960s; and later cable, satellite, digital and high-definition broadcasting, leading to today's streaming. Each step made television more accessible and more central to daily life.","ru":"Достаточно выстроить хронологию: механическое ТВ (<strong>Baird</strong>, 1920-е), электронное ТВ (<strong>Zworykin</strong>, <strong>Farnsworth</strong>, 1930-е), первые регулярные эфиры (<strong>BBC</strong>, 1936), бум после Второй мировой (1950-е), цветное ТВ (1950–60-е), затем кабель, спутник, цифра и стриминг. Главное показать движение от эксперимента к массовому медиа.","terms":["<strong>Mechanical television</strong>: the earliest TV system using spinning discs, shown in the 1920s (механическое телевидение).","<strong>Electronic television</strong>: TV based on the cathode-ray tube, which replaced mechanical systems in the 1930s (электронное телевидение)."],"tickets":[8],"raw":"what were the key milestones in the history of television broadcasting? tv milestones television grew from a laboratory experiment into the dominant medium of the twentieth century through several key steps. the main milestones were: the early mechanical television demonstrated by john logie baird in the 1920s; the move to electronic television in the 1930s thanks to inventors like vladimir zworykin and philo farnsworth; the first regular public broadcasts, such as the bbc service from 1936; the rapid post-war boom of tv in homes during the 1950s; the arrival of colour television in the 1950s and 1960s; and later cable, satellite, digital and high-definition broadcasting, leading to today's streaming. each step made television more accessible and more central to daily life. достаточно выстроить хронологию: механическое тв (**baird**, 1920-е), электронное тв (**zworykin**, **farnsworth**, 1930-е), первые регулярные эфиры (**bbc**, 1936), бум после второй мировой (1950-е), цветное тв (1950–60-е), затем кабель, спутник, цифра и стриминг. главное показать движение от эксперимента к массовому медиа."},{"code":"B8","label":"CTA &amp; Touchpoints","q":"Explain the usage of categories «CTA» and «Touchpoints» as last steps in CJM.","en":"A journey is only successful if it ends in action, and that depends on the final two steps of the CJM. \"Touchpoints\" are the channels where the consumer meets information about the brand at a given stage, for example the TikTok profile page, the comment section, a Telegram channel or a link in the bio. \"CTA\" (call to action) is what the brand does to make sure the consumer notices, remembers and chooses it at that stage, such as \"Follow for the next drop\" or \"Check the link in bio\". Touchpoints answer \"where do we meet the customer\", while the CTA answers \"what do we ask them to do next\", turning attention into a concrete action.","ru":"<strong>Touchpoints</strong>, каналы, где потребитель встречает информацию о бренде на данном этапе (профиль в TikTok, комментарии, Telegram-канал, ссылка в bio). <strong>CTA</strong> (call to action), что бренд делает, чтобы его заметили, запомнили и выбрали (\"Подпишись\", \"Ссылка в описании\"). Формула: touchpoints отвечают на \"где встречаем клиента\", а CTA, на \"к какому действию подталкиваем\".","terms":["<strong>Touchpoint</strong>: a channel where the consumer meets the brand (точка контакта).","<strong>CTA (Call to Action)</strong>: what the brand asks the consumer to do next (призыв к действию)."],"tickets":[8,23],"raw":"explain the usage of categories «cta» and «touchpoints» as last steps in cjm. cta & touchpoints a journey is only successful if it ends in action, and that depends on the final two steps of the cjm. \"touchpoints\" are the channels where the consumer meets information about the brand at a given stage, for example the tiktok profile page, the comment section, a telegram channel or a link in the bio. \"cta\" (call to action) is what the brand does to make sure the consumer notices, remembers and chooses it at that stage, such as \"follow for the next drop\" or \"check the link in bio\". touchpoints answer \"where do we meet the customer\", while the cta answers \"what do we ask them to do next\", turning attention into a concrete action. **touchpoints**, каналы, где потребитель встречает информацию о бренде на данном этапе (профиль в tiktok, комментарии, telegram-канал, ссылка в bio). **cta** (call to action), что бренд делает, чтобы его заметили, запомнили и выбрали (\"подпишись\", \"ссылка в описании\"). формула: touchpoints отвечают на \"где встречаем клиента\", а cta, на \"к какому действию подталкиваем\"."},{"code":"C8","label":"CJM: Golden Apple vs Rive Gauche","q":"Compare two CJM's, for the brands Golden Apple and Rive Gauche. Start with the description of the representative of TA.","en":"Comparing two beauty retailers is easiest if we picture one shared type of customer first. Imagine Elena, 30, living in a large city with a medium to high income, who loves cosmetics and perfume and wants quality products and a pleasant shopping experience. For Golden Apple, her journey is more digital and trend-driven: she discovers new launches through Instagram and bloggers (Awareness), compares the wide assortment and reads reviews in the app (Consideration), and buys via the convenient app or a modern store with strong loyalty rewards (Decision). For Rive Gauche, her journey is more classic and store-centred: she notices the brand through shopping-centre presence and promotions (Awareness), considers it for trusted perfume and the loyalty card (Consideration), and buys mostly in physical stores with the help of consultants (Decision). The main difference is that Golden Apple leads on digital experience and assortment, while Rive Gauche leads on physical retail presence and tradition.","ru":"Начните с общего портрета (например, Елена, 30 лет, крупный город, средний/высокий доход, любит косметику и парфюм). Затем сравните две карты. <strong>Golden Apple</strong>: путь более цифровой, открытие через Instagram и блогеров, огромный ассортимент, удобное приложение, сильная программа лояльности. <strong>Rive Gauche</strong>: путь более классический, акцент на офлайн-магазинах в ТЦ, консультанты, проверенная парфюмерия. Вывод: Golden Apple выигрывает цифровым опытом и ассортиментом, Rive Gauche, офлайн-присутствием и традицией.","terms":["<strong>CJM (Customer Journey Map)</strong>: a table mapping the customer path from awareness to decision (карта пути клиента).","<strong>Awareness stage</strong>: the first stage, when the consumer first learns the product exists (этап знания).","<strong>Consideration stage</strong>: the middle stage, when the consumer compares options (этап рассмотрения).","<strong>Decision stage</strong>: the final stage, when the consumer chooses and buys (этап решения)."],"tickets":[8,23],"raw":"compare two cjm's, for the brands golden apple and rive gauche. start with the description of the representative of ta. cjm: golden apple vs rive gauche comparing two beauty retailers is easiest if we picture one shared type of customer first. imagine elena, 30, living in a large city with a medium to high income, who loves cosmetics and perfume and wants quality products and a pleasant shopping experience. for golden apple, her journey is more digital and trend-driven: she discovers new launches through instagram and bloggers (awareness), compares the wide assortment and reads reviews in the app (consideration), and buys via the convenient app or a modern store with strong loyalty rewards (decision). for rive gauche, her journey is more classic and store-centred: she notices the brand through shopping-centre presence and promotions (awareness), considers it for trusted perfume and the loyalty card (consideration), and buys mostly in physical stores with the help of consultants (decision). the main difference is that golden apple leads on digital experience and assortment, while rive gauche leads on physical retail presence and tradition. начните с общего портрета (например, елена, 30 лет, крупный город, средний/высокий доход, любит косметику и парфюм). затем сравните две карты. **golden apple**: путь более цифровой, открытие через instagram и блогеров, огромный ассортимент, удобное приложение, сильная программа лояльности. **rive gauche**: путь более классический, акцент на офлайн-магазинах в тц, консультанты, проверенная парфюмерия. вывод: golden apple выигрывает цифровым опытом и ассортиментом, rive gauche, офлайн-присутствием и традицией."},{"code":"A8","label":"3 radio genres","q":"What are the three main radio genres?","en":"Radio content, like other journalism, can be grouped by the way it treats information. The three main radio genres are: informational genres, which simply report facts and events, such as news bulletins and reports; analytical genres, which interpret and explain, such as commentaries, interviews and talk shows; and artistic or documentary genres, which use creative storytelling, such as radio features, documentaries and radio drama. This classification mirrors the general division of journalistic genres and helps a station balance fast news with deeper analysis and engaging storytelling.","ru":"Удобно опереться на общую классификацию жанров журналистики: <strong>informational</strong> (новости, репортаж), <strong>analytical</strong> (комментарий, интервью, ток-шоу) и <strong>artistic / documentary</strong> (радиоочерк, документалистика, радиоспектакль). Если преподаватель ждёт форматы, можно добавить music radio, talk radio и news radio, но безопаснее держаться этой жанровой тройки.","terms":["<strong>Informational genres</strong>: formats that simply report facts and events, such as news and reports (информационные жанры).","<strong>Analytical genres</strong>: formats that interpret and explain, such as commentary and interview (аналитические жанры).","<strong>Artistic / documentary genres</strong>: creative formats such as features, documentaries and radio drama (художественно-документальные жанры)."],"tickets":[9],"raw":"what are the three main radio genres? 3 radio genres radio content, like other journalism, can be grouped by the way it treats information. the three main radio genres are: informational genres, which simply report facts and events, such as news bulletins and reports; analytical genres, which interpret and explain, such as commentaries, interviews and talk shows; and artistic or documentary genres, which use creative storytelling, such as radio features, documentaries and radio drama. this classification mirrors the general division of journalistic genres and helps a station balance fast news with deeper analysis and engaging storytelling. удобно опереться на общую классификацию жанров журналистики: **informational** (новости, репортаж), **analytical** (комментарий, интервью, ток-шоу) и **artistic / documentary** (радиоочерк, документалистика, радиоспектакль). если преподаватель ждёт форматы, можно добавить music radio, talk radio и news radio, но безопаснее держаться этой жанровой тройки."},{"code":"B9","label":"Pre-CJM models","q":"What models of customer's behavior were used before the appearance of CJM? Give examples and compare them.","en":"Marketers tried to map customer behavior long before the modern CJM appeared. The earlier models include the AIDA model and the classic sales funnel. AIDA describes four linear steps: Attention (or Awareness), Interest, Desire and Action; it focuses on how advertising moves a person from noticing a product to buying it. The sales funnel shows how a large number of potential customers gradually narrows down at each stage until only buyers remain at the bottom. Comparing them, AIDA focuses on the psychological states inside the customer's mind, while the funnel focuses on numbers and conversion at each stage. Both are more linear and simpler than CJM, which adds emotions, touchpoints and the brand's actions at every step.","ru":"До CJM использовали модель <strong>AIDA</strong> (Attention/Awareness, Interest, Desire, Action) и классическую <strong>sales funnel</strong> (воронку продаж). Сравнение: AIDA описывает психологические состояния клиента, а funnel, сужение числа клиентов и конверсию на каждом этапе. Обе модели линейнее и проще, чем CJM, который добавляет эмоции, точки контакта и действия бренда. Можно упомянуть и PMPHS как пример воронки с \"болью\".","terms":["<strong>AIDA</strong>: a linear model with four steps: Attention, Interest, Desire, Action (модель AIDA).","<strong>Sales funnel</strong>: a model showing how many potential customers narrow down to buyers at each stage (воронка продаж)."],"tickets":[9,24],"raw":"what models of customer's behavior were used before the appearance of cjm? give examples and compare them. pre-cjm models marketers tried to map customer behavior long before the modern cjm appeared. the earlier models include the aida model and the classic sales funnel. aida describes four linear steps: attention (or awareness), interest, desire and action; it focuses on how advertising moves a person from noticing a product to buying it. the sales funnel shows how a large number of potential customers gradually narrows down at each stage until only buyers remain at the bottom. comparing them, aida focuses on the psychological states inside the customer's mind, while the funnel focuses on numbers and conversion at each stage. both are more linear and simpler than cjm, which adds emotions, touchpoints and the brand's actions at every step. до cjm использовали модель **aida** (attention/awareness, interest, desire, action) и классическую **sales funnel** (воронку продаж). сравнение: aida описывает психологические состояния клиента, а funnel, сужение числа клиентов и конверсию на каждом этапе. обе модели линейнее и проще, чем cjm, который добавляет эмоции, точки контакта и действия бренда. можно упомянуть и pmphs как пример воронки с \"болью\"."},{"code":"C9","label":"CJM: Cofix vs Drinkit","q":"Compare two CJM's, for the brands Cofix and Drinkit. Start with the description of the representative of TA.","en":"Both coffee brands target a similar customer, so let me start with one representative. Imagine Igor, 24, a student or junior specialist in a big city with a medium income, who buys coffee on the go almost every day and cares about price, speed and taste. For Cofix, his journey is price-led: he notices the famous fixed low price (Awareness), considers it as a cheap daily option near the metro (Consideration), and buys quickly because it is affordable and fast (Decision); the key driver is the low fixed price. For Drinkit, his journey is experience-led: he discovers it through its bright modern design and app (Awareness), considers it for tasty signature drinks and a cosy atmosphere (Consideration), and buys through the convenient app with loyalty bonuses (Decision); the key driver is product quality and digital experience. The main difference: Cofix competes on price, Drinkit competes on taste, brand and app experience.","ru":"Общий портрет (например, Игорь, 24 года, студент/junior, крупный город, берёт кофе с собой почти каждый день, важны цена, скорость, вкус). Сравнение: <strong>Cofix</strong>, путь ведёт цена: известная низкая фиксированная цена, дёшево и быстро у метро (драйвер, цена). <strong>Drinkit</strong>, путь ведёт опыт: яркий дизайн, фирменные напитки, удобное приложение и бонусы (драйвер, вкус и цифровой опыт). Вывод: Cofix конкурирует ценой, Drinkit, вкусом, брендом и приложением.","terms":["<strong>CJM (Customer Journey Map)</strong>: a table mapping the customer path from awareness to decision (карта пути клиента).","<strong>Awareness stage</strong>: the first stage, when the consumer first learns the product exists (этап знания).","<strong>Consideration stage</strong>: the middle stage, when the consumer compares options (этап рассмотрения).","<strong>Decision stage</strong>: the final stage, when the consumer chooses and buys (этап решения)."],"tickets":[9,24],"raw":"compare two cjm's, for the brands cofix and drinkit. start with the description of the representative of ta. cjm: cofix vs drinkit both coffee brands target a similar customer, so let me start with one representative. imagine igor, 24, a student or junior specialist in a big city with a medium income, who buys coffee on the go almost every day and cares about price, speed and taste. for cofix, his journey is price-led: he notices the famous fixed low price (awareness), considers it as a cheap daily option near the metro (consideration), and buys quickly because it is affordable and fast (decision); the key driver is the low fixed price. for drinkit, his journey is experience-led: he discovers it through its bright modern design and app (awareness), considers it for tasty signature drinks and a cosy atmosphere (consideration), and buys through the convenient app with loyalty bonuses (decision); the key driver is product quality and digital experience. the main difference: cofix competes on price, drinkit competes on taste, brand and app experience. общий портрет (например, игорь, 24 года, студент/junior, крупный город, берёт кофе с собой почти каждый день, важны цена, скорость, вкус). сравнение: **cofix**, путь ведёт цена: известная низкая фиксированная цена, дёшево и быстро у метро (драйвер, цена). **drinkit**, путь ведёт опыт: яркий дизайн, фирменные напитки, удобное приложение и бонусы (драйвер, вкус и цифровой опыт). вывод: cofix конкурирует ценой, drinkit, вкусом, брендом и приложением."},{"code":"A9","label":"UX in cars","q":"What is the latest trend in terms of UX in car manufacturing, why cars now compete with social media?","en":"Cars are no longer judged only by their engines, but increasingly by the digital experience inside them. The latest UX trend in car manufacturing is the shift towards large touchscreens, voice assistants, app integration and constant connectivity, turning the car into a \"third digital space\" after home and office. Modern vehicles are software-defined, with infotainment systems that stream music, video and even social content. Cars now compete with social media because both fight for the same scarce resource: the user's attention and time. While a driver or passenger sits in the car, manufacturers want them engaged with their own ecosystem rather than scrolling another app, so the in-car interface is designed to feel as smooth and engaging as a smartphone.","ru":"Главная мысль: фокус сместился с механики на цифровой опыт (<strong>UX</strong>). Тренды: большие тачскрины, голосовые ассистенты, постоянное подключение, <strong>software-defined</strong> автомобиль, развлечения в салоне. Почему конкуренция с соцсетями: и те, и другие борются за <strong>attention</strong> (внимание и время пользователя), поэтому интерфейс машины делают похожим на смартфон.","terms":["<strong>UX (User Experience)</strong>: how comfortable, intuitive and satisfying it feels to interact with a product (пользовательский опыт).","<strong>Software-defined vehicle</strong>: a car whose features are controlled and updated mainly through software (программно-определяемый автомобиль).","<strong>Infotainment system</strong>: the in-car screen system combining information and entertainment (информационно-развлекательная система)."],"tickets":[10],"raw":"what is the latest trend in terms of ux in car manufacturing, why cars now compete with social media? ux in cars cars are no longer judged only by their engines, but increasingly by the digital experience inside them. the latest ux trend in car manufacturing is the shift towards large touchscreens, voice assistants, app integration and constant connectivity, turning the car into a \"third digital space\" after home and office. modern vehicles are software-defined, with infotainment systems that stream music, video and even social content. cars now compete with social media because both fight for the same scarce resource: the user's attention and time. while a driver or passenger sits in the car, manufacturers want them engaged with their own ecosystem rather than scrolling another app, so the in-car interface is designed to feel as smooth and engaging as a smartphone. главная мысль: фокус сместился с механики на цифровой опыт (**ux**). тренды: большие тачскрины, голосовые ассистенты, постоянное подключение, **software-defined** автомобиль, развлечения в салоне. почему конкуренция с соцсетями: и те, и другие борются за **attention** (внимание и время пользователя), поэтому интерфейс машины делают похожим на смартфон."},{"code":"B10","label":"Benchmark: what &amp; how","q":"Benchmark analysis, what is it and how to use it?","en":"To know how good you really are, you have to compare yourself with others. Benchmark analysis is a method of comparing your own brand, product or metrics against competitors or industry standards in order to find gaps, learn best practices and set realistic goals. To use it, you first choose the right competitors, then select clear metrics such as engagement rate, posting frequency or content quality, then collect and compare the data, and finally draw conclusions about what to copy and what to do better. For example, our men's-fashion TikTok team analysed five top creators to set benchmarks for posting frequency and engagement before launching.","ru":"<strong>Bench
