mark analysis</strong>, метод сравнения своего бренда или показателей с конкурентами и отраслевыми стандартами, чтобы найти разрывы и перенять лучшие практики. Как применять: выбрать конкурентов, задать метрики (<strong>ER</strong>, частота постинга, качество контента), собрать и сравнить данные, сделать выводы. Пример из вашей работы, анализ пяти топ-блогеров TikTok перед запуском.","terms":["<strong>Benchmark analysis</strong>: comparing your brand or metrics against competitors and standards to find gaps (бенчмаркинг).","<strong>Engagement rate (ER)</strong>: the share of the audience that interacts with content (likes, comments, shares) (коэффициент вовлечённости)."],"tickets":[10,25],"raw":"benchmark analysis, what is it and how to use it? benchmark: what & how to know how good you really are, you have to compare yourself with others. benchmark analysis is a method of comparing your own brand, product or metrics against competitors or industry standards in order to find gaps, learn best practices and set realistic goals. to use it, you first choose the right competitors, then select clear metrics such as engagement rate, posting frequency or content quality, then collect and compare the data, and finally draw conclusions about what to copy and what to do better. for example, our men's-fashion tiktok team analysed five top creators to set benchmarks for posting frequency and engagement before launching. **benchmark analysis**, метод сравнения своего бренда или показателей с конкурентами и отраслевыми стандартами, чтобы найти разрывы и перенять лучшие практики. как применять: выбрать конкурентов, задать метрики (**er**, частота постинга, качество контента), собрать и сравнить данные, сделать выводы. пример из вашей работы, анализ пяти топ-блогеров tiktok перед запуском."},{"code":"C10","label":"Benchmark: Cofix","q":"Make a benchmark analysis of Cofix. Focus on competitors.","en":"A benchmark analysis is only meaningful against the right rivals, so let us focus on Cofix and its competitors. Cofix positions itself on a fixed low price for coffee and snacks. Its main competitors are other affordable coffee-to-go chains such as Stars Coffee, Surf Coffee, One Price Coffee and even bakery chains and convenience stores selling cheap coffee. Comparing key benchmarks: on price, Cofix leads with its famous fixed-price model; on assortment and atmosphere, chains like Surf Coffee are stronger, offering a lifestyle experience; on location density, Cofix competes by placing small points near metro stations and busy streets. The conclusion is that Cofix's benchmark advantage is price and speed, while its weakness compared with competitors is a weaker brand experience and limited atmosphere, which it should address to keep loyal customers.","ru":"Сфокусируйтесь на конкурентах. <strong>Cofix</strong> строится на фиксированной низкой цене. Конкуренты: <strong>Stars Coffee</strong>, <strong>Surf Coffee</strong>, <strong>One Price Coffee</strong>, а также пекарни и магазины с дешёвым кофе. Сравнение по бенчмаркам: по цене лидирует Cofix, по атмосфере и ассортименту сильнее Surf Coffee, по плотности точек Cofix берёт расположением у метро. Вывод: преимущество Cofix, цена и скорость; слабость, более слабый бренд-опыт и атмосфера.","terms":["<strong>Benchmark analysis</strong>: comparing your brand or metrics against competitors and standards to find gaps (бенчмаркинг).","<strong>Direct competitor</strong>: a rival offering a similar product to the same audience (прямой конкурент)."],"tickets":[10,25],"raw":"make a benchmark analysis of cofix. focus on competitors. benchmark: cofix a benchmark analysis is only meaningful against the right rivals, so let us focus on cofix and its competitors. cofix positions itself on a fixed low price for coffee and snacks. its main competitors are other affordable coffee-to-go chains such as stars coffee, surf coffee, one price coffee and even bakery chains and convenience stores selling cheap coffee. comparing key benchmarks: on price, cofix leads with its famous fixed-price model; on assortment and atmosphere, chains like surf coffee are stronger, offering a lifestyle experience; on location density, cofix competes by placing small points near metro stations and busy streets. the conclusion is that cofix's benchmark advantage is price and speed, while its weakness compared with competitors is a weaker brand experience and limited atmosphere, which it should address to keep loyal customers. сфокусируйтесь на конкурентах. **cofix** строится на фиксированной низкой цене. конкуренты: **stars coffee**, **surf coffee**, **one price coffee**, а также пекарни и магазины с дешёвым кофе. сравнение по бенчмаркам: по цене лидирует cofix, по атмосфере и ассортименту сильнее surf coffee, по плотности точек cofix берёт расположением у метро. вывод: преимущество cofix, цена и скорость; слабость, более слабый бренд-опыт и атмосфера."},{"code":"A10","label":"Digital editor","q":"What are the key features of digital editor's work? What is more important, multimedia handling or measuring engagement analysis? Why?","en":"The digital editor is a key figure who keeps online media fast, multimedia-rich and audience-driven. The main features of this work are managing multimedia content (text, photo, video, audio), publishing across several platforms at once, updating stories in real time, optimising content for search engines, and constantly tracking audience metrics. In my opinion, while multimedia handling is essential for quality, measuring engagement analysis is now more important, because data on what readers actually click, share and finish tells the editor which content works and guides every future decision. A beautiful multimedia story has little value if the analytics show that nobody engages with it.","ru":"Ключевые черты работы: работа с <strong>multimedia</strong>, мультиплатформенная публикация, обновление в реальном времени, <strong>SEO</strong> и анализ метрик. На вопрос что важнее, аргументированно выбираем <strong>engagement analysis</strong>: именно данные о вовлечённости показывают, что работает, и определяют дальнейшие решения. Это личное мнение, поэтому его нужно обосновать, а не просто назвать.","terms":["<strong>Engagement analysis</strong>: measuring how audiences interact with content (clicks, shares, time spent) to judge what works (анализ вовлечённости).","<strong>SEO (Search Engine Optimisation)</strong>: adjusting content so it ranks higher in search results (поисковая оптимизация).","<strong>Multimedia</strong>: combining several content formats (text, image, audio, video, infographics) in one piece (мультимедиа)."],"tickets":[11],"raw":"what are the key features of digital editor's work? what is more important, multimedia handling or measuring engagement analysis? why? digital editor the digital editor is a key figure who keeps online media fast, multimedia-rich and audience-driven. the main features of this work are managing multimedia content (text, photo, video, audio), publishing across several platforms at once, updating stories in real time, optimising content for search engines, and constantly tracking audience metrics. in my opinion, while multimedia handling is essential for quality, measuring engagement analysis is now more important, because data on what readers actually click, share and finish tells the editor which content works and guides every future decision. a beautiful multimedia story has little value if the analytics show that nobody engages with it. ключевые черты работы: работа с **multimedia**, мультиплатформенная публикация, обновление в реальном времени, **seo** и анализ метрик. на вопрос что важнее, аргументированно выбираем **engagement analysis**: именно данные о вовлечённости показывают, что работает, и определяют дальнейшие решения. это личное мнение, поэтому его нужно обосновать, а не просто назвать."},{"code":"B11","label":"Choosing competitors","q":"How do you choose competitors for the Benchmark analysis? Give an example.","en":"A benchmark is only useful if you compare yourself with the right rivals. To choose competitors for benchmark analysis, you look for brands that serve a similar audience, offer a similar product and operate at a comparable level, including direct competitors, indirect ones and aspirational leaders you want to learn from. The key is relevance: there is no point comparing a small local cafe with a global giant in every metric. For example, for our men's-fashion TikTok we chose creators in the same niche such as Louis Powell for reach and Albert Muzquiz for engagement, because they target the same kind of audience we want and show us realistic benchmarks to aim for.","ru":"Критерии выбора конкурентов: схожая аудитория, схожий продукт, сопоставимый масштаб; берут прямых, косвенных и \"эталонных\" (aspirational) игроков. Главное, релевантность: бессмысленно сравнивать маленькое кафе с мировым гигантом по всем метрикам. Пример: для TikTok о мужском стиле выбрали блогеров той же ниши (<strong>Louis Powell</strong> для охвата, <strong>Albert Muzquiz</strong> для вовлечённости).","terms":["<strong>Direct competitor</strong>: a rival offering a similar product to the same audience (прямой конкурент).","<strong>Aspirational competitor</strong>: a stronger leader you study and want to grow towards (эталонный конкурент)."],"tickets":[11,26],"raw":"how do you choose competitors for the benchmark analysis? give an example. choosing competitors a benchmark is only useful if you compare yourself with the right rivals. to choose competitors for benchmark analysis, you look for brands that serve a similar audience, offer a similar product and operate at a comparable level, including direct competitors, indirect ones and aspirational leaders you want to learn from. the key is relevance: there is no point comparing a small local cafe with a global giant in every metric. for example, for our men's-fashion tiktok we chose creators in the same niche such as louis powell for reach and albert muzquiz for engagement, because they target the same kind of audience we want and show us realistic benchmarks to aim for. критерии выбора конкурентов: схожая аудитория, схожий продукт, сопоставимый масштаб; берут прямых, косвенных и \"эталонных\" (aspirational) игроков. главное, релевантность: бессмысленно сравнивать маленькое кафе с мировым гигантом по всем метрикам. пример: для tiktok о мужском стиле выбрали блогеров той же ниши (**louis powell** для охвата, **albert muzquiz** для вовлечённости)."},{"code":"C11","label":"Benchmark: Drinkit","q":"Make a benchmark analysis of Drinkit. Focus on competitors.","en":"To benchmark Drinkit properly, we compare it with the coffee chains fighting for the same modern, digital customer. Drinkit, created within the Dodo ecosystem, positions itself on tasty signature drinks, bright design and a strong mobile app. Its main competitors are Surf Coffee, Stars Coffee, Cofix and Coffee Like. Comparing benchmarks: on app and digital experience, Drinkit is a leader thanks to its convenient ordering and loyalty system; on brand atmosphere and lifestyle image, Surf Coffee is a strong rival; on price, Cofix beats it with a cheaper fixed-price offer. The conclusion is that Drinkit's benchmark strengths are its product quality and technology, while its challenge is that it is not the cheapest option, so it must keep competing on taste, design and the smooth app experience rather than on price.","ru":"Сравните с теми, кто борется за ту же современную цифровую аудиторию. <strong>Drinkit</strong> (экосистема Dodo) делает ставку на вкусные фирменные напитки, дизайн и сильное приложение. Конкуренты: <strong>Surf Coffee</strong>, <strong>Stars Coffee</strong>, <strong>Cofix</strong>, <strong>Coffee Like</strong>. По бенчмаркам: приложение и цифровой опыт, лидер Drinkit; атмосфера и лайфстайл, силён Surf Coffee; цена, дешевле Cofix. Вывод: сильные стороны Drinkit, продукт и технологии; вызов, он не самый дешёвый.","terms":["<strong>Benchmark analysis</strong>: comparing your brand or metrics against competitors and standards to find gaps (бенчмаркинг).","<strong>Direct competitor</strong>: a rival offering a similar product to the same audience (прямой конкурент)."],"tickets":[11,26],"raw":"make a benchmark analysis of drinkit. focus on competitors. benchmark: drinkit to benchmark drinkit properly, we compare it with the coffee chains fighting for the same modern, digital customer. drinkit, created within the dodo ecosystem, positions itself on tasty signature drinks, bright design and a strong mobile app. its main competitors are surf coffee, stars coffee, cofix and coffee like. comparing benchmarks: on app and digital experience, drinkit is a leader thanks to its convenient ordering and loyalty system; on brand atmosphere and lifestyle image, surf coffee is a strong rival; on price, cofix beats it with a cheaper fixed-price offer. the conclusion is that drinkit's benchmark strengths are its product quality and technology, while its challenge is that it is not the cheapest option, so it must keep competing on taste, design and the smooth app experience rather than on price. сравните с теми, кто борется за ту же современную цифровую аудиторию. **drinkit** (экосистема dodo) делает ставку на вкусные фирменные напитки, дизайн и сильное приложение. конкуренты: **surf coffee**, **stars coffee**, **cofix**, **coffee like**. по бенчмаркам: приложение и цифровой опыт, лидер drinkit; атмосфера и лайфстайл, силён surf coffee; цена, дешевле cofix. вывод: сильные стороны drinkit, продукт и технологии; вызов, он не самый дешёвый."},{"code":"A11","label":"Hypertext &amp; multimedia","q":"Please describe main features of hypertextuality and multimedia with examples (both used for digital media).","en":"Two features make digital media fundamentally different from print: hypertextuality and multimedia. Hypertextuality is the ability to link texts together in a non-linear way through hyperlinks, so the reader can jump between related pages and choose their own path instead of reading from start to finish; Wikipedia, with its endless internal links, is a clear example. Multimedia is the combining of different content formats, text, images, audio, video and infographics, within a single piece, as in the famous New York Times longread \"Snow Fall\". Together they give digital media depth, interactivity and richer storytelling that paper cannot offer.","ru":"Два понятия: <strong>hypertextuality</strong>, нелинейные связи между текстами через гиперссылки (пример, Wikipedia), и <strong>multimedia</strong>, объединение текста, фото, видео, аудио и инфографики в одном материале (пример, лонгрид \"Snow Fall\"). Главное противопоставить это линейному печатному тексту и показать интерактивность.","terms":["<strong>Hypertextuality</strong>: linking texts non-linearly through hyperlinks so readers choose their own path (гипертекстуальность).","<strong>Multimedia</strong>: combining several content formats (text, image, audio, video, infographics) in one piece (мультимедиа)."],"tickets":[12],"raw":"please describe main features of hypertextuality and multimedia with examples (both used for digital media). hypertext & multimedia two features make digital media fundamentally different from print: hypertextuality and multimedia. hypertextuality is the ability to link texts together in a non-linear way through hyperlinks, so the reader can jump between related pages and choose their own path instead of reading from start to finish; wikipedia, with its endless internal links, is a clear example. multimedia is the combining of different content formats, text, images, audio, video and infographics, within a single piece, as in the famous new york times longread \"snow fall\". together they give digital media depth, interactivity and richer storytelling that paper cannot offer. два понятия: **hypertextuality**, нелинейные связи между текстами через гиперссылки (пример, wikipedia), и **multimedia**, объединение текста, фото, видео, аудио и инфографики в одном материале (пример, лонгрид \"snow fall\"). главное противопоставить это линейному печатному тексту и показать интерактивность."},{"code":"B12","label":"USP importance","q":"Why Unique selling proposition is important for any brand? How to create it?","en":"In a crowded market where many products look the same, a brand needs a clear reason to be chosen. A Unique Selling Proposition (USP) is important because it tells the customer in one clear idea why they should pick you instead of competitors; it is the basis of positioning, memorability and trust. To create a USP, you first study what your target audience really needs, then analyse what competitors already offer, then find the unique benefit that only you provide, and finally phrase it in a short, clear and honest sentence. Our TikTok USP is a good example: \"Dressing stylishly doesn't mean spending a lot, we show real outfits for real people with a real budget.\"","ru":"<strong>USP</strong> (Unique Selling Proposition), почему клиент должен выбрать именно вас, основа позиционирования и запоминаемости. Как создать: изучить потребность аудитории, проанализировать конкурентов, найти уникальную выгоду, которую даёте только вы, и сформулировать коротко и честно. Пример, ваш USP для TikTok про стильную одежду без больших затрат.","terms":["<strong>USP (Unique Selling Proposition)</strong>: the one clear reason to choose you over competitors (уникальное торговое предложение).","<strong>Positioning</strong>: the place a brand occupies in the customer mind versus rivals (позиционирование)."],"tickets":[12,27],"raw":"why unique selling proposition is important for any brand? how to create it? usp importance in a crowded market where many products look the same, a brand needs a clear reason to be chosen. a unique selling proposition (usp) is important because it tells the customer in one clear idea why they should pick you instead of competitors; it is the basis of positioning, memorability and trust. to create a usp, you first study what your target audience really needs, then analyse what competitors already offer, then find the unique benefit that only you provide, and finally phrase it in a short, clear and honest sentence. our tiktok usp is a good example: \"dressing stylishly doesn't mean spending a lot, we show real outfits for real people with a real budget.\" **usp** (unique selling proposition), почему клиент должен выбрать именно вас, основа позиционирования и запоминаемости. как создать: изучить потребность аудитории, проанализировать конкурентов, найти уникальную выгоду, которую даёте только вы, и сформулировать коротко и честно. пример, ваш usp для tiktok про стильную одежду без больших затрат."},{"code":"C12","label":"Benchmark: Surf Coffee","q":"Make a benchmark analysis of Surf Coffee. Focus on competitors.","en":"Surf Coffee competes less on price and more on lifestyle, so its benchmark should focus on experience-driven rivals. Surf Coffee positions itself as a community and lifestyle brand with a relaxed \"surf\" atmosphere and quality coffee. Its main competitors are Stars Coffee, Drinkit, Cofix and local specialty coffee shops. Comparing benchmarks: on atmosphere and brand community, Surf Coffee is a clear leader, offering a recognisable cosy vibe; on digital experience and app, Drinkit is stronger; on price, Cofix is cheaper. The conclusion is that Surf Coffee's benchmark advantage is its strong brand identity and loyal community, while its weakness is a higher price and weaker technology, so it should protect its unique atmosphere and invest in its app to match more digital competitors.","ru":"Фокус на конкурентах, ориентированных на опыт. <strong>Surf Coffee</strong>, это бренд про комьюнити и лайфстайл, расслабленную \"сёрф\"-атмосферу и качественный кофе. Конкуренты: <strong>Stars Coffee</strong>, <strong>Drinkit</strong>, <strong>Cofix</strong>, локальные спешелти-кофейни. По бенчмаркам: атмосфера и комьюнити, лидер Surf; приложение, сильнее Drinkit; цена, дешевле Cofix. Вывод: преимущество Surf, сильная идентичность и лояльное комьюнити; слабость, цена выше и слабее технологии.","terms":["<strong>Benchmark analysis</strong>: comparing your brand or metrics against competitors and standards to find gaps (бенчмаркинг).","<strong>Direct competitor</strong>: a rival offering a similar product to the same audience (прямой конкурент)."],"tickets":[12,27],"raw":"make a benchmark analysis of surf coffee. focus on competitors. benchmark: surf coffee surf coffee competes less on price and more on lifestyle, so its benchmark should focus on experience-driven rivals. surf coffee positions itself as a community and lifestyle brand with a relaxed \"surf\" atmosphere and quality coffee. its main competitors are stars coffee, drinkit, cofix and local specialty coffee shops. comparing benchmarks: on atmosphere and brand community, surf coffee is a clear leader, offering a recognisable cosy vibe; on digital experience and app, drinkit is stronger; on price, cofix is cheaper. the conclusion is that surf coffee's benchmark advantage is its strong brand identity and loyal community, while its weakness is a higher price and weaker technology, so it should protect its unique atmosphere and invest in its app to match more digital competitors. фокус на конкурентах, ориентированных на опыт. **surf coffee**, это бренд про комьюнити и лайфстайл, расслабленную \"сёрф\"-атмосферу и качественный кофе. конкуренты: **stars coffee**, **drinkit**, **cofix**, локальные спешелти-кофейни. по бенчмаркам: атмосфера и комьюнити, лидер surf; приложение, сильнее drinkit; цена, дешевле cofix. вывод: преимущество surf, сильная идентичность и лояльное комьюнити; слабость, цена выше и слабее технологии."},{"code":"A12","label":"Media personality","q":"Describe a media personality and how does a media personality distinguish from the author in classical media genres?","en":"Digital media have created a new type of public figure who is more than just a reporter. A media personality is a recognisable public figure with a strong personal brand, whose own image, opinions and style attract the audience across many platforms. This is different from the author in classical media genres, where the journalist usually stays behind the content: the author creates the text or report, but the focus is on the information, not on the writer's personality. In short, the classical author serves the message, while the media personality is the message, using their personal identity to build trust and loyalty.","ru":"Противопоставление: <strong>media personality</strong> (медиаперсона), это узнаваемый публичный образ с личным брендом, который сам по себе привлекает аудиторию на разных платформах. Классический <strong>author</strong> же остаётся за текстом: важна информация, а не личность автора. Формула для запоминания: автор служит сообщению, а медиаперсона сама является сообщением.","terms":["<strong>Media personality</strong>: a recognisable public figure with a strong personal brand across platforms (медиаперсона).","<strong>Author (classical genres)</strong>: the creator of a text who stays behind the content, focus on information not personality (автор)."],"tickets":[13],"raw":"describe a media personality and how does a media personality distinguish from the author in classical media genres? media personality digital media have created a new type of public figure who is more than just a reporter. a media personality is a recognisable public figure with a strong personal brand, whose own image, opinions and style attract the audience across many platforms. this is different from the author in classical media genres, where the journalist usually stays behind the content: the author creates the text or report, but the focus is on the information, not on the writer's personality. in short, the classical author serves the message, while the media personality is the message, using their personal identity to build trust and loyalty. противопоставление: **media personality** (медиаперсона), это узнаваемый публичный образ с личным брендом, который сам по себе привлекает аудиторию на разных платформах. классический **author** же остаётся за текстом: важна информация, а не личность автора. формула для запоминания: автор служит сообщению, а медиаперсона сама является сообщением."},{"code":"B13","label":"USP: two questions","q":"Answers of what two questions help you to determine a USP?","en":"A strong USP sits at the meeting point of two simple questions. The two questions that help you determine a USP are: first, \"What does the customer really need or want?\", and second, \"What do competitors not offer, in other words what makes us unique?\". The answer to the first keeps the USP relevant to the audience, while the answer to the second keeps it different from rivals. The ideal USP lives exactly where these two answers overlap: a benefit that the customer genuinely wants and that only your brand provides. If a promise is unique but useless, or useful but offered by everyone, it cannot become a real USP.","ru":"Два вопроса для USP: (1) Что реально нужно клиенту? (2) Чего не предлагают конкуренты, то есть в чём наша уникальность? Первый держит предложение релевантным, второй, отличающимся. Идеальный USP находится на пересечении: выгода, которую клиент хочет и которую даёте только вы. Если уникально, но бесполезно, или полезно, но есть у всех, это не USP.","terms":["<strong>USP (Unique Selling Proposition)</strong>: the one clear reason to choose you over competitors (уникальное торговое предложение)."],"tickets":[13,28],"raw":"answers of what two questions help you to determine a usp? usp: two questions a strong usp sits at the meeting point of two simple questions. the two questions that help you determine a usp are: first, \"what does the customer really need or want?\", and second, \"what do competitors not offer, in other words what makes us unique?\". the answer to the first keeps the usp relevant to the audience, while the answer to the second keeps it different from rivals. the ideal usp lives exactly where these two answers overlap: a benefit that the customer genuinely wants and that only your brand provides. if a promise is unique but useless, or useful but offered by everyone, it cannot become a real usp. два вопроса для usp: (1) что реально нужно клиенту? (2) чего не предлагают конкуренты, то есть в чём наша уникальность? первый держит предложение релевантным, второй, отличающимся. идеальный usp находится на пересечении: выгода, которую клиент хочет и которую даёте только вы. если уникально, но бесполезно, или полезно, но есть у всех, это не usp."},{"code":"C13","label":"USP: Bratya Karavaevy","q":"Describe the process of making a USP. Prepare the USP for Brat'ya Karavaevy.","en":"Creating a USP means finding the one promise that fits both the customer's need and the brand's strength. The process is: study the audience's need, analyse competitors, find a unique benefit and phrase it clearly. Brat'ya Karavaevy is a bakery-cafe chain known for fresh home-style baking and a wide choice of pastries, salads and ready meals. Its audience wants tasty, fresh, \"like homemade\" food quickly during a busy city day, and competitors are either expensive cafes or impersonal fast food. So a fitting USP would be: \"Brat'ya Karavaevy, fresh home-style baking and honest food for your everyday city life.\" This is relevant to the customer's wish for warm, homemade taste and different from both pricey restaurants and faceless fast food.","ru":"Сначала покажите процесс (потребность, конкуренты, уникальная выгода, формулировка). <strong>Brat'ya Karavaevy</strong>, сеть пекарен-кафе с домашней выпечкой и готовой едой. Аудитория хочет вкусную свежую еду \"как дома\" в городском ритме; конкуренты, либо дорогие кафе, либо обезличенный фастфуд. Возможный USP: \"свежая домашняя выпечка и честная еда для каждого дня\". Он релевантен (домашний вкус) и уникален (не дорого и не безлико).","terms":["<strong>USP (Unique Selling Proposition)</strong>: the one clear reason to choose you over competitors (уникальное торговое предложение).","<strong>Positioning</strong>: the place a brand occupies in the customer mind versus rivals (позиционирование)."],"tickets":[13,28],"raw":"describe the process of making a usp. prepare the usp for brat'ya karavaevy. usp: bratya karavaevy creating a usp means finding the one promise that fits both the customer's need and the brand's strength. the process is: study the audience's need, analyse competitors, find a unique benefit and phrase it clearly. brat'ya karavaevy is a bakery-cafe chain known for fresh home-style baking and a wide choice of pastries, salads and ready meals. its audience wants tasty, fresh, \"like homemade\" food quickly during a busy city day, and competitors are either expensive cafes or impersonal fast food. so a fitting usp would be: \"brat'ya karavaevy, fresh home-style baking and honest food for your everyday city life.\" this is relevant to the customer's wish for warm, homemade taste and different from both pricey restaurants and faceless fast food. сначала покажите процесс (потребность, конкуренты, уникальная выгода, формулировка). **brat'ya karavaevy**, сеть пекарен-кафе с домашней выпечкой и готовой едой. аудитория хочет вкусную свежую еду \"как дома\" в городском ритме; конкуренты, либо дорогие кафе, либо обезличенный фастфуд. возможный usp: \"свежая домашняя выпечка и честная еда для каждого дня\". он релевантен (домашний вкус) и уникален (не дорого и не безлико)."},{"code":"A13","label":"Analytical journalism","q":"Please explain analytical style of journalism in your own words and give an example.","en":"Not all journalism simply reports what happened; some of it tries to explain why. In my own words, the analytical style of journalism goes beyond plain facts to interpret events, examine their causes and consequences, compare different viewpoints and offer forecasts. Instead of just telling the reader \"the central bank raised the rate\", an analytical piece explains why it happened, who benefits, who loses and what may come next. A good example is an analytical article in a business outlet like RBC or Vedomosti that breaks down an economic decision and its likely effects.","ru":"Главное отличие от информационной журналистики: аналитика не просто сообщает факт, а объясняет причины, последствия и контекст, сравнивает точки зрения и даёт прогноз. Пример, аналитическая статья в <strong>RBC</strong> или <strong>Vedomosti</strong>, разбирающая экономическое решение. В ответе обязательно противопоставьте \"что произошло\" и \"почему и что дальше\".","terms":["<strong>Analytical journalism</strong>: journalism that interprets events, their causes, consequences and likely future (аналитическая журналистика)."],"tickets":[14],"raw":"please explain analytical style of journalism in your own words and give an example. analytical journalism not all journalism simply reports what happened; some of it tries to explain why. in my own words, the analytical style of journalism goes beyond plain facts to interpret events, examine their causes and consequences, compare different viewpoints and offer forecasts. instead of just telling the reader \"the central bank raised the rate\", an analytical piece explains why it happened, who benefits, who loses and what may come next. a good example is an analytical article in a business outlet like rbc or vedomosti that breaks down an economic decision and its likely effects. главное отличие от информационной журналистики: аналитика не просто сообщает факт, а объясняет причины, последствия и контекст, сравнивает точки зрения и даёт прогноз. пример, аналитическая статья в **rbc** или **vedomosti**, разбирающая экономическое решение. в ответе обязательно противопоставьте \"что произошло\" и \"почему и что дальше\"."},{"code":"B14","label":"UNIDO 10 categories","q":"Name all 10 categories of UNIDO standard business plan.","en":"International organisations created standard templates so that any investor can read a business plan easily. The UNIDO standard business plan has ten categories: 1) Executive summary; 2) Description of the enterprise and industry; 3) Description of the product or service; 4) Marketing and sales plan; 5) Production plan; 6) Organisational plan; 7) Financial plan; 8) Project focus and efficiency; 9) Risks and guarantees; and 10) Appendices. Following this structure makes a business plan complete and professional, because it covers the idea, the market, the operations, the money and the risks in a logical order that investors expect.","ru":"Десять разделов стандарта <strong>UNIDO</strong>: 1) Резюме (Executive summary), 2) Описание предприятия и отрасли, 3) Описание продукции/услуги, 4) Маркетинг и сбыт, 5) Производственный план, 6) Организационный план, 7) Финансовый план, 8) Направленность и эффективность проекта, 9) Риски и гарантии, 10) Приложения. Достаточно перечислить их по порядку, это проверка на знание структуры.","terms":["<strong>UNIDO</strong>: the UN Industrial Development Organisation, whose standard sets a common business-plan structure (стандарт UNIDO).","<strong>Executive summary</strong>: the short opening section summarising the whole business plan (резюме проекта)."],"tickets":[14,29],"raw":"name all 10 categories of unido standard business plan. unido 10 categories international organisations created standard templates so that any investor can read a business plan easily. the unido standard business plan has ten categories: 1) executive summary; 2) description of the enterprise and industry; 3) description of the product or service; 4) marketing and sales plan; 5) production plan; 6) organisational plan; 7) financial plan; 8) project focus and efficiency; 9) risks and guarantees; and 10) appendices. following this structure makes a business plan complete and professional, because it covers the idea, the market, the operations, the money and the risks in a logical order that investors expect. десять разделов стандарта **unido**: 1) резюме (executive summary), 2) описание предприятия и отрасли, 3) описание продукции/услуги, 4) маркетинг и сбыт, 5) производственный план, 6) организационный план, 7) финансовый план, 8) направленность и эффективность проекта, 9) риски и гарантии, 10) приложения. достаточно перечислить их по порядку, это проверка на знание структуры."},{"code":"C14","label":"USP: Dodo Pizza","q":"Describe the process of making a USP. Prepare the USP for Dodo Pizza.","en":"A good USP turns one real strength into a clear promise. Following the process of studying the audience, analysing competitors and finding a unique benefit, look at Dodo Pizza. Its real differentiator is openness and technology: transparent kitchens, an honest production process and a powerful app and ecosystem, plus reliable delivery even in smaller towns. Its audience wants tasty pizza they can trust, delivered fast, and competitors are either local pizzerias or global chains. A fitting USP is: \"Dodo Pizza, honest, open and fast: tasty pizza with a transparent kitchen and delivery you can rely on.\" This is valuable to customers who want trust and speed, and unique because few competitors combine radical transparency with strong technology.","ru":"По процессу (потребность, конкуренты, уникальная выгода). <strong>Dodo Pizza</strong>, отличается открытостью и технологичностью: прозрачные кухни, честный процесс, сильное приложение и доставка даже в малых городах. Аудитория хочет вкусную пиццу, которой можно доверять, и быструю доставку. Возможный USP: \"честная, открытая и быстрая пицца с прозрачной кухней\". Уникальность, мало кто сочетает прозрачность с технологиями.","terms":["<strong>USP (Unique Selling Proposition)</strong>: the one clear reason to choose you over competitors (уникальное торговое предложение).","<strong>Positioning</strong>: the place a brand occupies in the customer mind versus rivals (позиционирование)."],"tickets":[14,29],"raw":"describe the process of making a usp. prepare the usp for dodo pizza. usp: dodo pizza a good usp turns one real strength into a clear promise. following the process of studying the audience, analysing competitors and finding a unique benefit, look at dodo pizza. its real differentiator is openness and technology: transparent kitchens, an honest production process and a powerful app and ecosystem, plus reliable delivery even in smaller towns. its audience wants tasty pizza they can trust, delivered fast, and competitors are either local pizzerias or global chains. a fitting usp is: \"dodo pizza, honest, open and fast: tasty pizza with a transparent kitchen and delivery you can rely on.\" this is valuable to customers who want trust and speed, and unique because few competitors combine radical transparency with strong technology. по процессу (потребность, конкуренты, уникальная выгода). **dodo pizza**, отличается открытостью и технологичностью: прозрачные кухни, честный процесс, сильное приложение и доставка даже в малых городах. аудитория хочет вкусную пиццу, которой можно доверять, и быструю доставку. возможный usp: \"честная, открытая и быстрая пицца с прозрачной кухней\". уникальность, мало кто сочетает прозрачность с технологиями."},{"code":"A14","label":"Protocols","q":"Please provide a definition for protocols in online journalism. What are they used for?","en":"Behind every online publication there are invisible technical rules that make the web work. In online journalism, protocols are standardised sets of rules that allow computers to exchange and deliver content over the internet, such as HTTP and HTTPS for loading web pages, or RSS for distributing news feeds. They are used to transfer data reliably between servers and users, to syndicate articles automatically to other sites and apps, and to keep communication secure. Without these shared protocols, content could not be published, linked or distributed consistently across different platforms and devices.","ru":"Под <strong>protocols</strong> здесь понимаются стандартные правила обмена данными в сети: <strong>HTTP / HTTPS</strong> (загрузка страниц), <strong>RSS</strong> (распространение новостных лент). Для чего: передача данных между сервером и пользователем, автоматическая рассылка материалов на другие площадки (синдикация) и безопасность. Идея, без общих протоколов контент нельзя единообразно публиковать и распространять.","terms":["<strong>Protocol</strong>: a standardised set of rules that lets computers exchange data over the internet (протокол).","<strong>HTTP / HTTPS</strong>: the protocol for loading web pages; HTTPS is its secure version (протокол передачи гипертекста).","<strong>RSS</strong>: a protocol for automatically distributing news feeds to other sites and apps (формат рассылки новостных лент)."],"tickets":[15],"raw":"please provide a definition for protocols in online journalism. what are they used for? protocols behind every online publication there are invisible technical rules that make the web work. in online journalism, protocols are standardised sets of rules that allow computers to exchange and deliver content over the internet, such as http and https for loading web pages, or rss for distributing news feeds. they are used to transfer data reliably between servers and users, to syndicate articles automatically to other sites and apps, and to keep communication secure. without these shared protocols, content could not be published, linked or distributed consistently across different platforms and devices. под **protocols** здесь понимаются стандартные правила обмена данными в сети: **http / https** (загрузка страниц), **rss** (распространение новостных лент). для чего: передача данных между сервером и пользователем, автоматическая рассылка материалов на другие площадки (синдикация) и безопасность. идея, без общих протоколов контент нельзя единообразно публиковать и распространять."},{"code":"B15","label":"Pain funnel (PMPHS)","q":"Describe the funnel of customer's behavior which includes the «pain» part. How to use it?","en":"Good selling often starts not with the product but with the customer's pain. The funnel of customer behavior that includes the \"pain\" part is the PMPHS model: Pain, More Pain, Hope, Solution. First you name the customer's Pain, the problem they feel, for example teenage skin problems. Then you intensify it with More Pain, reminding them how the problem affects their life and confidence. Then you offer Hope, showing that a solution exists. Finally you present the Solution, your product, as the answer. To use it, you build your advertising message in this exact order, so the audience feels understood first and only then receives your offer, which makes the message far more persuasive.","ru":"Это воронка <strong>PMPHS</strong>: <strong>Pain</strong> (боль), <strong>More Pain</strong> (усиление боли), <strong>Hope</strong> (надежда), <strong>Solution</strong> (решение). Сначала называете проблему клиента (например, подростковые проблемы с кожей), затем усиливаете её, потом даёте надежду и в финале предлагаете продукт как решение. Как использовать: строить рекламное сообщение именно в этом порядке, чтобы человек сперва почувствовал, что его понимают, и только потом получил оффер.","terms":["<strong>PMPHS</strong>: a copywriting funnel with four steps: Pain, More Pain, Hope, Solution (формула PMPHS)."],"tickets":[15,30],"raw":"describe the funnel of customer's behavior which includes the «pain» part. how to use it? pain funnel (pmphs) good selling often starts not with the product but with the customer's pain. the funnel of customer behavior that includes the \"pain\" part is the pmphs model: pain, more pain, hope, solution. first you name the customer's pain, the problem they feel, for example teenage skin problems. then you intensify it with more pain, reminding them how the problem affects their life and confidence. then you offer hope, showing that a solution exists. finally you present the solution, your product, as the answer. to use it, you build your advertising message in this exact order, so the audience feels understood first and only then receives your offer, which makes the message far more persuasive. это воронка **pmphs**: **pain** (боль), **more pain** (усиление боли), **hope** (надежда), **solution** (решение). сначала называете проблему клиента (например, подростковые проблемы с кожей), затем усиливаете её, потом даёте надежду и в финале предлагаете продукт как решение. как использовать: строить рекламное сообщение именно в этом порядке, чтобы человек сперва почувствовал, что его понимают, и только потом получил оффер."},{"code":"C15","label":"USP: Rostics","q":"Describe the process of making a USP. Prepare the USP for Rostics.","en":"When a brand re-launches, a sharp USP helps it win customers back. Using the process of studying the audience, analysing competitors and finding a unique benefit, consider Rostics, the chicken-focused fast-food chain that took over the former KFC restaurants in Russia. Its real strength is its signature crispy fried chicken and a familiar, loved menu now under a Russian brand. Its audience wants tasty, affordable fast food with a recognisable chicken taste, and competitors include burger-focused chains and other fast food. A fitting USP is: \"Rostics, the favourite crispy chicken taste you know, now truly ours.\" This is relevant because customers want that specific chicken experience, and unique because Rostics owns the strongest chicken positioning in the Russian fast-food market.","ru":"По процессу (потребность, конкуренты, уникальная выгода). <strong>Rostics</strong>, сеть фастфуда на курице, занявшая бывшие рестораны KFC в России. Сильная сторона, фирменная хрустящая курица и привычное меню под российским брендом. Аудитория хочет вкусный доступный фастфуд с узнаваемым \"куриным\" вкусом; конкуренты, бургерные и прочий фастфуд. Возможный USP: \"любимый хрустящий вкус курицы, теперь по-настоящему наш\". Уникальность, самое сильное \"куриное\" позиционирование на рынке.","terms":["<strong>USP (Unique Selling Proposition)</strong>: the one clear reason to choose you over competitors (уникальное торговое предложение).","<strong>Positioning</strong>: the place a brand occupies in the customer mind versus rivals (позиционирование)."],"tickets":[15,30],"raw":"describe the process of making a usp. prepare the usp for rostics. usp: rostics when a brand re-launches, a sharp usp helps it win customers back. using the process of studying the audience, analysing competitors and finding a unique benefit, consider rostics, the chicken-focused fast-food chain that took over the former kfc restaurants in russia. its real strength is its signature crispy fried chicken and a familiar, loved menu now under a russian brand. its audience wants tasty, affordable fast food with a recognisable chicken taste, and competitors include burger-focused chains and other fast food. a fitting usp is: \"rostics, the favourite crispy chicken taste you know, now truly ours.\" this is relevant because customers want that specific chicken experience, and unique because rostics owns the strongest chicken positioning in the russian fast-food market. по процессу (потребность, конкуренты, уникальная выгода). **rostics**, сеть фастфуда на курице, занявшая бывшие рестораны kfc в россии. сильная сторона, фирменная хрустящая курица и привычное меню под российским брендом. аудитория хочет вкусный доступный фастфуд с узнаваемым \"куриным\" вкусом; конкуренты, бургерные и прочий фастфуд. возможный usp: \"любимый хрустящий вкус курицы, теперь по-настоящему наш\". уникальность, самое сильное \"куриное\" позиционирование на рынке."},{"code":"A15","label":"TV milestones &amp; functions","q":"Name the most important milestones in TV development history. What are the functions of TV journalism?","en":"Television became powerful both because of how it developed technically and because of the social roles it took on. The most important milestones in TV history were mechanical television in the 1920s (Baird), electronic television in the 1930s (Zworykin, Farnsworth), the first regular public broadcasts such as the BBC in 1936, the post-war boom of the 1950s, colour TV in the 1950s and 1960s, and later cable, satellite, digital and streaming. The functions of TV journalism are informing the audience about events, analysing and explaining them, educating viewers, entertaining them, shaping public opinion and providing a form of social control by holding power to account.","ru":"Две части ответа. Вехи, те же, что и по истории ТВ: <strong>Baird</strong> (1920-е), <strong>Zworykin</strong> / <strong>Farnsworth</strong> (1930-е), <strong>BBC</strong> (1936), бум 1950-х, цветное ТВ, кабель и цифра. Функции тележурналистики: информировать, анализировать, образовывать, развлекать, формировать мнение и осуществлять социальный контроль. Назовите обе части по очереди.","terms":["<strong>Electronic television</strong>: TV based on the cathode-ray tube, which replaced mechanical systems in the 1930s (электронное телевидение).","<strong>Social control (of media)</strong>: the media role of overseeing power and holding it to account (социальный контроль)."],"tickets":[16],"raw":"name the most important milestones in tv development history. what are the functions of tv journalism? tv milestones & functions television became powerful both because of how it developed technically and because of the social roles it took on. the most important milestones in tv history were mechanical television in the 1920s (baird), electronic television in the 1930s (zworykin, farnsworth), the first regular public broadcasts such as the bbc in 1936, the post-war boom of the 1950s, colour tv in the 1950s and 1960s, and later cable, satellite, digital and streaming. the functions of tv journalism are informing the audience about events, analysing and explaining them, educating viewers, entertaining them, shaping public opinion and providing a form of social control by holding power to account. две части ответа. вехи, те же, что и по истории тв: **baird** (1920-е), **zworykin** / **farnsworth** (1930-е), **bbc** (1936), бум 1950-х, цветное тв, кабель и цифра. функции тележурналистики: информировать, анализировать, образовывать, развлекать, формировать мнение и осуществлять социальный контроль. назовите обе части по очереди."},{"code":"A16","label":"TV shooting techniques","q":"What are the 2 types of shooting techniques for TV, please elaborate on differences?","en":"How a programme is filmed depends heavily on where and how it is produced. The two main shooting techniques for television are studio shooting and location (or field) shooting. Studio shooting takes place indoors in a controlled environment, usually with several cameras at once (multi-camera), stable lighting and sound, which is ideal for news programmes, talk shows and entertainment. Location shooting happens outside the studio, on real sites, often with a single mobile camera (ENG, electronic news gathering), which is essential for reports and documentaries but harder to control. The key difference is control versus authenticity: the studio offers stability, while location offers realism.","ru":"Две техники: <strong>studio shooting</strong> (в студии, контролируемые свет и звук, часто несколько камер, <strong>multi-camera</strong>) и <strong>location / field shooting</strong> (на месте событий, обычно одна мобильная камера, <strong>ENG</strong>). Главное различие: студия даёт контроль и стабильность, а съёмка на локации, реалистичность, но меньше контроля.","terms":["<strong>Studio shooting</strong>: filming indoors in a controlled environment, usually with several cameras (студийная съёмка).","<strong>Location / field shooting</strong>: filming outside the studio on real sites, often with one camera (съёмка на локации).","<strong>ENG (Electronic News Gathering)</strong>: mobile single-camera filming of news on location (мобильная съёмка новостей).","<strong>Multi-camera</strong>: recording with several cameras at once, typical of studios (многокамерная съёмка)."],"tickets":[17],"raw":"what are the 2 types of shooting techniques for tv, please elaborate on differences? tv shooting techniques how a programme is filmed depends heavily on where and how it is produced. the two main shooting techniques for television are studio shooting and location (or field) shooting. studio shooting takes place indoors in a controlled environment, usually with several cameras at once (multi-camera), stable lighting and sound, which is ideal for news programmes, talk shows and entertainment. location shooting happens outside the studio, on real sites, often with a single mobile camera (eng, electronic news gathering), which is essential for reports and documentaries but harder to control. the key difference is control versus authenticity: the studio offers stability, while location offers realism. две техники: **studio shooting** (в студии, контролируемые свет и звук, часто несколько камер, **multi-camera**) и **location / field shooting** (на месте событий, обычно одна мобильная камера, **eng**). главное различие: студия даёт контроль и стабильность, а съёмка на локации, реалистичность, но меньше контроля."},{"code":"A17","label":"Streaming &amp; trends","q":"What streaming services do you know? What are the latest trends in streaming, name at least 3.","en":"Streaming has become the main way audiences consume video and audio today. The streaming services I know include global and Russian platforms such as YouTube, Netflix, Kinopoisk, Okko, Wink, Twitch, Spotify and Yandex Music. At least three of the latest trends are: first, ad-supported subscription tiers, where users pay less but watch some advertising; second, the rise of live and short-form content, such as live streams and short vertical videos competing with TikTok; and third, AI-driven personalisation, where the platform recommends content based on each user's behaviour. A further trend is the growing focus on local original content for specific national markets.","ru":"Сначала перечислите сервисы (<strong>YouTube</strong>, <strong>Netflix</strong>, <strong>Kinopoisk</strong>, <strong>Okko</strong>, <strong>Wink</strong>, <strong>Twitch</strong>, <strong>Spotify</strong>, <strong>Yandex Music</strong>). Затем минимум три тренда: рекламные тарифы (<strong>ad-supported tiers</strong>), рост лайв и коротких вертикальных видео, и <strong>AI</strong>-персонализация рекомендаций. Можно добавить ставку на локальный оригинальный контент.","terms":["<strong>Streaming</strong>: delivering video or audio over the internet in real time without downloading (стриминг).","<strong>Ad-supported tier</strong>: a cheaper subscription level that shows some advertising (тариф с рекламой).","<strong>Short-form content</strong>: short vertical videos in the style of TikTok and Reels (короткий вертикальный контент)."],"tickets":[18,19],"raw":"what streaming services do you know? what are the latest trends in streaming, name at least 3. streaming & trends streaming has become the main way audiences consume video and audio today. the streaming services i know include global and russian platforms such as youtube, netflix, kinopoisk, okko, wink, twitch, spotify and yandex music. at least three of the latest trends are: first, ad-supported subscription tiers, where users pay less but watch some advertising; second, the rise of live and short-form content, such as live streams and short vertical videos competing with tiktok; and third, ai-driven personalisation, where the platform recommends content based on each user's behaviour. a further trend is the growing focus on local original content for specific national markets. сначала перечислите сервисы (**youtube**, **netflix**, **kinopoisk**, **okko**, **wink**, **twitch**, **spotify**, **yandex music**). затем минимум три тренда: рекламные тарифы (**ad-supported tiers**), рост лайв и коротких вертикальных видео, и **ai**-персонализация рекомендаций. можно добавить ставку на локальный оригинальный контент."},{"code":"A18","label":"Printing methods","q":"What are the main printing methods nowadays, name at least 2 and give examples? What are the latest trends in streaming, name at least 3.","en":"Even in the digital age, printing remains a large industry with several distinct technologies. The two main printing methods used nowadays are offset printing and digital printing. Offset printing transfers ink from a plate to a rubber blanket and then to paper; it is economical for large print runs and is used for newspapers, books and magazines. Digital printing prints directly from a digital file without plates; it is ideal for short runs and personalised products such as photo books, flyers and on-demand printing. As for streaming, three current trends are ad-supported subscription tiers, short-form and live content, and AI-based personalised recommendations.","ru":"Вопрос сдвоенный (в билете случайно осталась часть про стриминг), поэтому ответьте на обе части. Методы печати: <strong>offset printing</strong> (для больших тиражей, газеты, книги, журналы) и <strong>digital printing</strong> (малые тиражи и персонализация, фотокниги, листовки). Тренды стриминга: рекламные тарифы, короткий и лайв-контент, <strong>AI</strong>-рекомендации.","terms":["<strong>Offset printing</strong>: ink moves from a plate to a rubber blanket then to paper; best for large runs (офсетная печать).","<strong>Digital printing</strong>: printing directly from a digital file without plates; best for short, personalised runs (цифровая печать)."],"tickets":[20],"raw":"what are the main printing methods nowadays, name at least 2 and give examples? what are the latest trends in streaming, name at least 3. printing methods even in the digital age, printing remains a large industry with several distinct technologies. the two main printing methods used nowadays are offset printing and digital printing. offset printing transfers ink from a plate to a rubber blanket and then to paper; it is economical for large print runs and is used for newspapers, books and magazines. digital printing prints directly from a digital file without plates; it is ideal for short runs and personalised products such as photo books, flyers and on-demand printing. as for streaming, three current trends are ad-supported subscription tiers, short-form and live content, and ai-based personalised recommendations. вопрос сдвоенный (в билете случайно осталась часть про стриминг), поэтому ответьте на обе части. методы печати: **offset printing** (для больших тиражей, газеты, книги, журналы) и **digital printing** (малые тиражи и персонализация, фотокниги, листовки). тренды стриминга: рекламные тарифы, короткий и лайв-контент, **ai**-рекомендации."},{"code":"A19","label":"Translation workflow","q":"Please name the 5 stages of translation workflow.","en":"Professional translation is not a single step but a structured process that protects quality. The five stages of the translation workflow are: first, analysis and preparation, where the translator studies the source text, its purpose and terminology; second, translation itself, the drafting of the text in the target language; third, editing, where another specialist checks accuracy and meaning against the original; fourth, proofreading, which corrects grammar, spelling and style; and fifth, final quality assurance and delivery, the last check of formatting and consistency before the text is handed to the client. This sequence ensures both accuracy and readability.","ru":"Пять стадий по порядку: (1) <strong>analysis / preparation</strong> (анализ исходного текста и терминологии), (2) <strong>translation</strong> (черновой перевод), (3) <strong>editing</strong> (сверка с оригиналом), (4) <strong>proofreading</strong> (грамматика, орфография, стиль), (5) <strong>quality assurance / delivery</strong> (финальная проверка и сдача). Это модель <strong>TEP</strong> с анализом и контролем качества вокруг неё.","terms":["<strong>Editing</strong>: checking a translation against the original for accuracy and meaning (редактирование).","<strong>Proofreading</strong>: correcting grammar, spelling and style in the final text (корректура).","<strong>Quality assurance (QA)</strong>: the final check of formatting and consistency before delivery (контроль качества)."],"tickets":[21],"raw":"please name the 5 stages of translation workflow. translation workflow professional translation is not a single step but a structured process that protects quality. the five stages of the translation workflow are: first, analysis and preparation, where the translator studies the source text, its purpose and terminology; second, translation itself, the drafting of the text in the target language; third, editing, where another specialist checks accuracy and meaning against the original; fourth, proofreading, which corrects grammar, spelling and style; and fifth, final quality assurance and delivery, the last check of formatting and consistency before the text is handed to the client. this sequence ensures both accuracy and readability. пять стадий по порядку: (1) **analysis / preparation** (анализ исходного текста и терминологии), (2) **translation** (черновой перевод), (3) **editing** (сверка с оригиналом), (4) **proofreading** (грамматика, орфография, стиль), (5) **quality assurance / delivery** (финальная проверка и сдача). это модель **tep** с анализом и контролем качества вокруг неё."},{"code":"A20","label":"Radio journalism functions","q":"Please name the 5 functions of radio journalism, elaborate on each.","en":"Radio journalism serves its audience in several complementary ways. Its five main functions are: the informational function, delivering news and facts quickly; the communicative function, connecting people and giving a voice to listeners through calls and messages; the entertainment or recreational function, providing music and light programmes; the educational and cultural function, spreading knowledge and supporting culture; and the social or mobilising function, uniting communities and encouraging action, for example during emergencies. Because radio is fast, cheap and works anywhere, it performs these functions especially well in cars, at work and in remote areas.","ru":"Пять функций радиожурналистики: <strong>informational</strong> (быстрые новости), <strong>communicative</strong> (связь со слушателями, эфирные звонки), <strong>entertainment</strong> (музыка, лёгкие программы), <strong>educational / cultural</strong> (просвещение) и <strong>social / mobilising</strong> (объединение и призыв к действию). Подкрепите тем, что радио быстрое, дешёвое и доступно везде, в машине, на работе, в отдалённых районах.","terms":[],"tickets":[22],"raw":"please name the 5 functions of radio journalism, elaborate on each. radio journalism functions radio journalism serves its audience in several complementary ways. its five main functions are: the informational function, delivering news and facts quickly; the communicative function, connecting people and giving a voice to listeners through calls and messages; the entertainment or recreational function, providing music and light programmes; the educational and cultural function, spreading knowledge and supporting culture; and the social or mobilising function, uniting communities and encouraging action, for example during emergencies. because radio is fast, cheap and works anywhere, it performs these functions especially well in cars, at work and in remote areas. пять функций радиожурналистики: **informational** (быстрые новости), **communicative** (связь со слушателями, эфирные звонки), **entertainment** (музыка, лёгкие программы), **educational / cultural** (просвещение) и **social / mobilising** (объединение и призыв к действию). подкрепите тем, что радио быстрое, дешёвое и доступно везде, в машине, на работе, в отдалённых районах."},{"code":"A21","label":"Radio format specialization","q":"When did radio format specialization occur? What were the formats?","en":"Radio had to reinvent itself when television arrived and took away its mass family audience. Radio format specialisation occurred mainly in the 1950s and 1960s, especially in the United States, when stations stopped trying to please everyone and instead targeted specific audiences. The new formats included Top 40 (popular hits), all-news radio, talk radio, country, rock and classical music stations. By specialising, each station could attract a clear audience and sell that audience to advertisers, which is the same logic of targeting we still use today.","ru":"Когда: <strong>1950–60-е годы</strong> (прежде всего в США), как реакция на конкуренцию с телевидением. Форматы: <strong>Top 40</strong>, <strong>all-news</strong>, <strong>talk radio</strong>, кантри, рок, классика. Логика: вместо вещания \"для всех\" станции стали таргетировать конкретную аудиторию и продавать её рекламодателям.","terms":["<strong>Format radio</strong>: a station built around one specific style and audience rather than \"for everyone\" (форматное радио).","<strong>Top 40</strong>: a radio format playing the current most popular hits (формат \"сорок главных хитов\")."],"tickets":[23],"raw":"when did radio format specialization occur? what were the formats? radio format specialization radio had to reinvent itself when television arrived and took away its mass family audience. radio format specialisation occurred mainly in the 1950s and 1960s, especially in the united states, when stations stopped trying to please everyone and instead targeted specific audiences. the new formats included top 40 (popular hits), all-news radio, talk radio, country, rock and classical music stations. by specialising, each station could attract a clear audience and sell that audience to advertisers, which is the same logic of targeting we still use today. когда: **1950–60-е годы** (прежде всего в сша), как реакция на конкуренцию с телевидением. форматы: **top 40**, **all-news**, **talk radio**, кантри, рок, классика. логика: вместо вещания \"для всех\" станции стали таргетировать конкретную аудиторию и продавать её рекламодателям."},{"code":"A22","label":"UX &amp; vehicles","q":"What does UX stand for? How social media UX started to influence the passenger vehicle production recently?","en":"Modern cars increasingly borrow ideas from the apps on our phones. UX stands for User Experience, meaning how comfortable, intuitive and satisfying it feels to interact with a product. Recently, social media UX has started to influence passenger vehicle production because carmakers have adopted the same design logic as apps: large touchscreens, smooth animations, personal user profiles, app stores inside the car, voice assistants and constant connectivity. The goal is to keep the driver and passengers inside the brand's digital ecosystem, since cars now compete with smartphones and social platforms for the user's attention and screen time.","ru":"Расшифровка: <strong>UX</strong> = <strong>User Experience</strong> (удобство и впечатление от взаимодействия). Как соцсети влияют на автопром: большие экраны, плавные анимации, профили пользователей, встроенные магазины приложений, голосовые ассистенты, постоянное подключение. Причина: борьба за <strong>attention</strong> пользователя, машина конкурирует со смартфоном.","terms":["<strong>UX (User Experience)</strong>: how comfortable, intuitive and satisfying it feels to interact with a product (пользовательский опыт).","<strong>Infotainment system</strong>: the in-car screen system combining information and entertainment (информационно-развлекательная система)."],"tickets":[24],"raw":"what does ux stand for? how social media ux started to influence the passenger vehicle production recently? ux & vehicles modern cars increasingly borrow ideas from the apps on our phones. ux stands for user experience, meaning how comfortable, intuitive and satisfying it feels to interact with a product. recently, social media ux has started to influence passenger vehicle production because carmakers have adopted the same design logic as apps: large touchscreens, smooth animations, personal user profiles, app stores inside the car, voice assistants and constant connectivity. the goal is to keep the driver and passengers inside the brand's digital ecosystem, since cars now compete with smartphones and social platforms for the user's attention and screen time. расшифровка: **ux** = **user experience** (удобство и впечатление от взаимодействия). как соцсети влияют на автопром: большие экраны, плавные анимации, профили пользователей, встроенные магазины приложений, голосовые ассистенты, постоянное подключение. причина: борьба за **attention** пользователя, машина конкурирует со смартфоном."},{"code":"A23","label":"4 media theory types","q":"Please name 4 types of media theories that arise from classifying media by research focus, what is your favourite and why?","en":"Researchers study media from very different angles, and this gives us several families of theory. Four types of media theories that arise from classifying media by research focus are: effects theories, which study how media influence audiences (for example agenda-setting); normative theories, which describe how media should ideally operate in society (for example the free-press model); audience or reception theories, which focus on how people actually use and interpret media (for example uses and gratifications); and critical or political-economy theories, which examine ownership, power and ideology behind the media. My favourite is effects theory, because it shows in a concrete, measurable way how the media shape public opinion and behaviour.","ru":"Четыре группы по фокусу исследования: <strong>effects theories</strong> (влияние на аудиторию, например agenda-setting), <strong>normative theories</strong> (как СМИ должны работать в идеале), <strong>audience / reception theories</strong> (как люди реально используют медиа, например uses and gratifications) и <strong>critical / political-economy theories</strong> (власть, собственность, идеология). Выберите любимую и обоснуйте, удобно взять effects theory: её влияние измеримо.","terms":["<strong>Effects theories</strong>: theories studying how media influence audiences (теории медиаэффектов).","<strong>Normative theories</strong>: theories of how media should ideally operate in society (нормативные теории).","<strong>Audience / reception theories</strong>: theories of how people actually use and interpret media (теории аудитории).","<strong>Critical / political-economy theories</strong>: theories examining ownership, power and ideology behind media (критические теории)."],"tickets":[26],"raw":"please name 4 types of media theories that arise from classifying media by research focus, what is your favourite and why? 4 media theory types researchers study media from very different angles, and this gives us several families of theory. four types of media theories that arise from classifying media by research focus are: effects theories, which study how media influence audiences (for example agenda-setting); normative theories, which describe how media should ideally operate in society (for example the free-press model); audience or reception theories, which focus on how people actually use and interpret media (for example uses and gratifications); and critical or political-economy theories, which examine ownership, power and ideology behind the media. my favourite is effects theory, because it shows in a concrete, measurable way how the media shape public opinion and behaviour. четыре группы по фокусу исследования: **effects theories** (влияние на аудиторию, например agenda-setting), **normative theories** (как сми должны работать в идеале), **audience / reception theories** (как люди реально используют медиа, например uses and gratifications) и **critical / political-economy theories** (власть, собственность, идеология). выберите любимую и обоснуйте, удобно взять effects theory: её влияние измеримо."},{"code":"A24","label":"3 Russian media","q":"Name 3 Russian mainstream media and describe their traits: content, funding, reach, editorial control, agenda.","en":"Russian mainstream media differ a lot depending on who owns and funds them. Take three examples. Channel One (Pervy Kanal) has broad entertainment and news content, is largely state-funded, has nationwide reach, strong central editorial control and a state-aligned agenda. RBC focuses on business and economic content, is privately owned and ad-funded, reaches an urban professional audience, has more independent editorial control and a business-oriented agenda. Komsomolskaya Pravda offers popular, tabloid-style content, mixes commercial and other funding, has a very wide mass reach, centralised editorial control and a broad social and political agenda. Comparing them shows how funding and ownership shape content, reach and agenda.","ru":"Возьмите три примера и опишите по пяти признакам (content, funding, reach, editorial control, agenda). <strong>Channel One</strong>: развлекательно-новостной контент, в основном государственное финансирование, общенациональный охват, централизованный контроль, провластная повестка. <strong>RBC</strong>: деловой контент, частное и рекламное финансирование, городская аудитория, более независимая редакция. <strong>Komsomolskaya Pravda</strong>: массовый таблоидный контент, очень широкий охват. Держитесь нейтрального, фактического тона.","terms":["<strong>Editorial control</strong>: who decides what content is published and how (редакционный контроль).","<strong>Agenda</strong>: the set of topics and viewpoints a media outlet tends to promote (повестка)."],"tickets":[27],"raw":"name 3 russian mainstream media and describe their traits: content, funding, reach, editorial control, agenda. 3 russian media russian mainstream media differ a lot depending on who owns and funds them. take three examples. channel one (pervy kanal) has broad entertainment and news content, is largely state-funded, has nationwide reach, strong central editorial control and a state-aligned agenda. rbc focuses on business and economic content, is privately owned and ad-funded, reaches an urban professional audience, has more independent editorial control and a business-oriented agenda. komsomolskaya pravda offers popular, tabloid-style content, mixes commercial and other funding, has a very wide mass reach, centralised editorial control and a broad social and political agenda. comparing them shows how funding and ownership shape content, reach and agenda. возьмите три примера и опишите по пяти признакам (content, funding, reach, editorial control, agenda). **channel one**: развлекательно-новостной контент, в основном государственное финансирование, общенациональный охват, централизованный контроль, провластная повестка. **rbc**: деловой контент, частное и рекламное финансирование, городская аудитория, более независимая редакция. **komsomolskaya pravda**: массовый таблоидный контент, очень широкий охват. держитесь нейтрального, фактического тона."},{"code":"A25","label":"3 influence theories","q":"Name 3 media influence theories and describe one of them in detail.","en":"Scholars have proposed several theories to explain how strongly the media affect us. Three media influence theories are agenda-setting theory, cultivation theory and the uses and gratifications approach. I will describe cultivation theory in detail. Developed by George Gerbner, cultivation theory argues that the more time people spend watching television, the more they come to see the real world as similar to the world shown on screen. For example, heavy viewers of crime shows tend to believe that the world is more dangerous than it really is, a pattern Gerbner called the \"mean world syndrome\". The theory shows that media influence is gradual and long-term, shaping our overall picture of reality rather than single opinions.","ru":"Назовите три теории: <strong>agenda-setting</strong>, <strong>cultivation theory</strong> и <strong>uses and gratifications</strong>. Подробно раскройте одну, удобно cultivation theory (<strong>George Gerbner</strong>): чем больше человек смотрит ТВ, тем сильнее он считает реальный мир похожим на экранный (эффект \"mean world syndrome\", мир кажется опаснее). Главная мысль, влияние медиа постепенное и долгосрочное.","terms":["<strong>Cultivation theory</strong>: the more TV people watch, the more they see reality as similar to the screen (теория культивации).","<strong>Mean world syndrome</strong>: heavy viewers come to believe the world is more dangerous than it really is (синдром злого мира).","<strong>Uses and gratifications</strong>: the approach that audiences actively choose media to meet their own needs (теория использования и удовлетворения)."],"tickets":[28],"raw":"name 3 media influence theories and describe one of them in detail. 3 influence theories scholars have proposed several theories to explain how strongly the media affect us. three media influence theories are agenda-setting theory, cultivation theory and the uses and gratifications approach. i will describe cultivation theory in detail. developed by george gerbner, cultivation theory argues that the more time people spend watching television, the more they come to see the real world as similar to the world shown on screen. for example, heavy viewers of crime shows tend to believe that the world is more dangerous than it really is, a pattern gerbner called the \"mean world syndrome\". the theory shows that media influence is gradual and long-term, shaping our overall picture of reality rather than single opinions. назовите три теории: **agenda-setting**, **cultivation theory** и **uses and gratifications**. подробно раскройте одну, удобно cultivation theory (**george gerbner**): чем больше человек смотрит тв, тем сильнее он считает реальный мир похожим на экранный (эффект \"mean world syndrome\", мир кажется опаснее). главная мысль, влияние медиа постепенное и долгосрочное."},{"code":"A26","label":"Online journalism styles","q":"Please describe analytical, artistic and informational online journalism and give at least one example.","en":"Online journalism is not a single style but a mix of several approaches. Analytical online journalism interprets events and explains their causes and consequences; a good example is RBC, which publishes detailed analytical breakdowns. Artistic (or literary) online journalism uses creative storytelling, vivid language and personal voice, often in the form of longreads and essays, in the style of the New York Times \"Snow Fall\" project. Informational journalism, the news style, simply reports facts quickly and objectively, as news agencies like TASS or Interfax do. Each style serves a different reader need: understanding, emotion or quick information.","ru":"Три стиля с примерами. <strong>Analytical</strong>: объясняет причины и последствия (пример, <strong>RBC</strong>). <strong>Artistic / literary</strong>: образное повествование, лонгриды и эссе (в духе \"Snow Fall\"). <strong>Informational / news</strong>: быстро и объективно сообщает факты (агентства <strong>TASS</strong>, <strong>Interfax</strong>). Свяжите каждый стиль с потребностью читателя: понять, прочувствовать или быстро узнать.","terms":["<strong>Analytical journalism</strong>: journalism that interprets events, their causes, consequences and likely future (аналитическая журналистика).","<strong>Artistic / literary journalism</strong>: creative storytelling with vivid language, often longreads and essays (художественная журналистика).","<strong>Informational journalism</strong>: the news style that reports facts quickly and objectively (информационная журналистика)."],"tickets":[29],"raw":"please describe analytical, artistic and informational online journalism and give at least one example. online journalism styles online journalism is not a single style but a mix of several approaches. analytical online journalism interprets events and explains their causes and consequences; a good example is rbc, which publishes detailed analytical breakdowns. artistic (or literary) online journalism uses creative storytelling, vivid language and personal voice, often in the form of longreads and essays, in the style of the new york times \"snow fall\" project. informational journalism, the news style, simply reports facts quickly and objectively, as news agencies like tass or interfax do. each style serves a different reader need: understanding, emotion or quick information. три стиля с примерами. **analytical**: объясняет причины и последствия (пример, **rbc**). **artistic / literary**: образное повествование, лонгриды и эссе (в духе \"snow fall\"). **informational / news**: быстро и объективно сообщает факты (агентства **tass**, **interfax**). свяжите каждый стиль с потребностью читателя: понять, прочувствовать или быстро узнать."},{"code":"A27","label":"Tags, CSS, metadata","q":"Please explain why tags, style sheets, metadata are called advantages of media publishing?","en":"Digital publishing is powerful partly because of three hidden tools that organise and present content. Tags, style sheets and metadata are called advantages of media publishing for the following reasons. Tags label and categorise content, which makes it easy to search, filter and navigate between related materials. Style sheets (CSS) separate content from design, so a publisher can keep a consistent look across thousands of pages and redesign the whole site by changing one file. Metadata is \"data about data\", such as the author, date and keywords, which improves search-engine visibility, archiving and machine readability. Together they make on
