line publishing fast, consistent, searchable and easy to scale, something print never allowed.","ru":"Объясните пользу каждого инструмента. <strong>Tags</strong>: маркируют и категоризируют контент, упрощают поиск и навигацию. <strong>Style sheets (CSS)</strong>: отделяют содержание от оформления, дают единый дизайн и лёгкий рестайл через один файл. <strong>Metadata</strong>: \"данные о данных\" (автор, дата, ключевые слова), улучшают <strong>SEO</strong>, архивирование и машиночитаемость. Вывод: вместе они делают цифровую публикацию быстрой, единообразной, удобной для поиска и масштабируемой.","terms":["<strong>Tag</strong>: a label that categorises content so it is easy to search and navigate (тег).","<strong>Style sheet (CSS)</strong>: a file that controls design separately from content for a consistent look (таблица стилей).","<strong>Metadata</strong>: \"data about data\" (author, date, keywords) that aids search and archiving (метаданные)."],"tickets":[30],"raw":"please explain why tags, style sheets, metadata are called advantages of media publishing? tags, css, metadata digital publishing is powerful partly because of three hidden tools that organise and present content. tags, style sheets and metadata are called advantages of media publishing for the following reasons. tags label and categorise content, which makes it easy to search, filter and navigate between related materials. style sheets (css) separate content from design, so a publisher can keep a consistent look across thousands of pages and redesign the whole site by changing one file. metadata is \"data about data\", such as the author, date and keywords, which improves search-engine visibility, archiving and machine readability. together they make online publishing fast, consistent, searchable and easy to scale, something print never allowed. объясните пользу каждого инструмента. **tags**: маркируют и категоризируют контент, упрощают поиск и навигацию. **style sheets (css)**: отделяют содержание от оформления, дают единый дизайн и лёгкий рестайл через один файл. **metadata**: \"данные о данных\" (автор, дата, ключевые слова), улучшают **seo**, архивирование и машиночитаемость. вывод: вместе они делают цифровую публикацию быстрой, единообразной, удобной для поиска и масштабируемой."}],"ticketMap":[["A1","B1","C1"],["A2","B2","C2"],["A3","B3","C3"],["A4","B4","C4"],["A4","B5","C5"],["A5","B6","C6"],["A6","B7","C7"],["A7","B8","C8"],["A8","B9","C9"],["A9","B10","C10"],["A10","B11","C11"],["A11","B12","C12"],["A12","B13","C13"],["A13","B14","C14"],["A14","B15","C15"],["A15","B1","C1"],["A16","B2","C2"],["A17","B3","C3"],["A17","B4","C4"],["A18","B5","C5"],["A19","B6","C6"],["A20","B7","C7"],["A21","B8","C8"],["A22","B9","C9"],["A1","B10","C10"],["A23","B11","C11"],["A24","B12","C12"],["A25","B13","C13"],["A26","B14","C14"],["A27","B15","C15"]]};
const byCode = {};
DATA.entries.forEach(function(e){ byCode[e.code]=e; });
function tickLabel(a){ return a.length>1 ? ('билеты '+a.join(', ')) : ('билет '+a[0]); }
function fmtCard(e){
  var t='';
  if(e.terms.length){
    t='<div class="lbl">Key terms / Ключевые термины</div><ul class="terms">';
    e.terms.forEach(function(x){ t+='<li>'+x+'</li>'; });
    t+='</ul>';
  }
  return '<div class="card"><div class="chead"><span class="code">'+e.code+'</span>'+e.q+
    ' <span class="tk">('+tickLabel(e.tickets)+')</span></div>'+
    '<div class="lbl">Answer (English)</div><p class="en">'+e.en+'</p>'+
    '<div class="lbl">Пояснение (на русском)</div><p class="ru">'+e.ru+'</p>'+t+'</div>';
}
function showTicket(n){
  var out=document.getElementById('out');
  var codes=DATA.ticketMap[n-1];
  var html='<p class="mode">Режим: билет</p><h2>Билет № '+n+'</h2>';
  codes.forEach(function(c,i){ html+='<div class="qn">Вопрос '+(i+1)+'</div>'+fmtCard(byCode[c]); });
  out.innerHTML=html; window.scrollTo(0,0);
}
function doSearch(q){
  q=(q||'').trim().toLowerCase();
  var out=document.getElementById('out');
  clearActive();
  if(q.length<2){ out.innerHTML='<p class="hint">Введите хотя бы 2 буквы для поиска.</p>'; return; }
  var res=DATA.entries.filter(function(e){ return e.raw.indexOf(q)>=0; });
  if(!res.length){ out.innerHTML='<p class="hint">Ничего не найдено.</p>'; return; }
  out.innerHTML='<p class="mode">Режим: поиск</p><h2>Найдено: '+res.length+'</h2>'+res.map(fmtCard).join('');
  window.scrollTo(0,0);
}
